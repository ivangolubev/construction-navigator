<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>建设项目导航 / Навигатор строительного проекта</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

        :root {
            --bg: #f7f7f5;
            --surface: #ffffff;
            --surface2: #f3f4f6;
            --border: #e2e4e9;
            --border2: #d0d3db;
            --accent: #1a6cf0;
            --accent-light: #eff4ff;
            --accent2: #0ea86e;
            --accent2-light: #edfaf5;
            --warn: #d97706;
            --warn-light: #fffbeb;
            --text: #111827;
            --text-muted: #6b7280;
            --text-dim: #9ca3af;
            --green: #0ea86e;
            --orange: #d97706;
            --radius: 10px;
            --radius-sm: 6px;
            --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-weight: 400;
            min-height: 100vh;
        }

        :lang(zh) body, html[lang="zh-CN"] { font-size: 15px; }
        html[lang="zh-CN"] .step-name { font-size: 13.5px; }
        html[lang="zh-CN"] .desc-text { font-size: 14.5px; }
        html[lang="zh-CN"] .check-text { font-size: 14px; }
        html[lang="zh-CN"] .q-item { font-size: 14px; }
        html[lang="zh-CN"] .detail-title { font-size: clamp(15px, 2vw, 19px); }

        /* ── HEADER ── */
        header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(247,247,245,0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            display: flex; align-items: center; justify-content: space-between;
            height: 56px;
        }

        .logo { display: flex; align-items: center; gap: 10px; }
        .logo-text { line-height: 1.2; }
        .logo-title {
            font-size: 13px; font-weight: 600;
            color: var(--text); letter-spacing: -0.2px;
        }
        .logo-sub { font-size: 11px; color: var(--text-muted); }

        .header-right { display: flex; align-items: center; gap: 10px; }

        .lang-switch {
            display: flex; background: var(--surface);
            border: 1px solid var(--border); border-radius: 50px;
            padding: 3px; gap: 2px;
        }
        .lang-btn {
            padding: 5px 14px; border-radius: 50px; border: none;
            cursor: pointer; font-family: 'DM Sans', sans-serif;
            font-size: 12px; font-weight: 500; transition: all .15s;
            background: transparent; color: var(--text-muted);
        }
        .lang-btn.active { background: var(--accent); color: #fff; }

        .export-btn {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 14px; background: var(--surface);
            border: 1px solid var(--border); border-radius: var(--radius-sm);
            font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
            color: var(--text-muted); cursor: pointer; transition: all .15s;
            white-space: nowrap;
        }
        .export-btn:hover { border-color: var(--accent); color: var(--accent); }
        .export-btn svg { width:14px; height:14px; flex-shrink:0; }

        /* ── PIPELINE ── */
        .pipeline {
            display: flex; max-width: 1100px; margin: 0 auto 32px; padding: 0 24px;
            overflow-x: auto; scrollbar-width: none; gap: 0;
        }
        .pipeline::-webkit-scrollbar { display: none; }

        .pipe-stage { flex: 1; min-width: 110px; cursor: pointer; outline: none; }
        .pipe-stage:focus-visible .pipe-stage-inner { box-shadow: 0 0 0 3px var(--accent-light); border-color: var(--accent); }
        .pipe-stage-inner {
            background: var(--surface); border: 1px solid var(--border);
            border-right: none; padding: 12px 14px 10px; transition: all .15s;
        }
        .pipe-stage:first-child .pipe-stage-inner { border-radius: var(--radius-sm) 0 0 var(--radius-sm); }
        .pipe-stage:last-child .pipe-stage-inner { border-right: 1px solid var(--border); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
        .pipe-stage.active .pipe-stage-inner { background: var(--accent); border-color: var(--accent); }
        .pipe-stage:hover:not(.active) .pipe-stage-inner { background: var(--surface2); }

        .pipe-num { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text-dim); margin-bottom: 3px; }
        .pipe-stage.active .pipe-num { color: rgba(255,255,255,.6); }
        .pipe-label { font-size: 11px; font-weight: 500; color: var(--text-muted); line-height: 1.3; }
        .pipe-stage.active .pipe-label { color: #fff; font-weight: 600; }
        .pipe-dot { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
        .pipe-dot span { width:10px; height:10px; border-radius:50%; background: var(--border2); flex-shrink:0; }
        .pipe-stage.active .pipe-dot span { background: rgba(255,255,255,.3); }
        .pipe-dot span.done { background: var(--green); }
        .pipe-dot span.partial { background: conic-gradient(var(--orange) 0% 50%, var(--border2) 50% 100%); }
        .pipe-stage.active .pipe-dot span.done { background: #4ade80; }
        .pipe-stage.active .pipe-dot span.partial { background: conic-gradient(#fb923c 0% 50%, rgba(255,255,255,.25) 50% 100%); }

        /* ── MAIN LAYOUT ── */
        .main {
            max-width: 1100px; margin: 0 auto; padding: 0 24px 80px;
            display: grid; grid-template-columns: 280px 1fr; gap: 20px; align-items: start;
        }

        /* ── SIDEBAR ── */
        .sidebar { position: sticky; top: 72px; }
        .sidebar-title {
            font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500;
            color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em;
            margin-bottom: 8px; padding: 0 4px;
        }
        .step-list { display: flex; flex-direction: column; gap: 2px; }
        .step-item {
            display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px;
            border-radius: var(--radius-sm); cursor: pointer; border: 1px solid transparent;
            transition: all .15s; outline: none;
        }
        .step-item:hover { background: var(--surface); border-color: var(--border); }
        .step-item.active { background: var(--surface); border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
        .step-item:focus-visible { box-shadow: 0 0 0 3px var(--accent-light); border-color: var(--accent); }

        .step-status {
            width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--border2);
            display: flex; align-items: center; justify-content: center;
            font-size: 9px; font-weight: 600; flex-shrink: 0; margin-top: 1px; transition: all .15s;
        }
        .step-status.done { background: var(--green); border-color: var(--green); color: #fff; }
        .step-status.warn { background: var(--orange); border-color: var(--orange); color: #fff; }
        .step-item.active .step-status.pending { border-color: var(--accent); }

        .step-info { flex: 1; min-width: 0; }
        .step-code { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text-dim); margin-bottom: 1px; }
        .step-name { font-size: 12px; font-weight: 500; color: var(--text-muted); line-height: 1.35; }
        .step-item.active .step-name { color: var(--text); }
        .step-time { font-size: 10px; color: var(--text-dim); margin-top: 1px; }

        /* ── DETAIL PANEL ── */
        .detail {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); box-shadow: var(--shadow);
            overflow: hidden; animation: fadeUp .2s ease;
        }
        @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

        .detail-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); background: var(--surface2); }
        .detail-stage-tag {
            font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim);
            text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px;
        }
        .detail-title {
            font-size: clamp(14px, 1.8vw, 17px); font-weight: 600; line-height: 1.3;
            color: var(--text); margin-bottom: 6px;
        }
        .detail-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }

        .badge {
            display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px;
            border-radius: 50px; font-size: 11px; font-weight: 500; border: 1px solid;
            text-decoration: none; transition: all .15s; white-space: nowrap;
        }
        .badge-time { color: var(--text-muted); border-color: var(--border); background: var(--surface); }
        .badge-who { color: var(--text-muted); border-color: var(--border); background: var(--surface); }
        .badge-law {
            color: var(--accent); border-color: rgba(26,108,240,.2); background: var(--accent-light);
            cursor: pointer; font-family: 'DM Mono', monospace; font-size: 10px;
        }
        .badge-law:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

        .progress-bar { height: 2px; background: var(--border); border-radius: 2px; margin-top: 14px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius:2px; transition: width .4s ease; }

        .detail-body { padding: 20px 24px; }

        .section-label {
            font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase;
            letter-spacing: 0.1em; color: var(--text-dim); font-weight: 500;
            margin-bottom: 10px; margin-top: 20px;
        }
        .section-label:first-child { margin-top: 0; }
        .desc-text { font-size: 13px; line-height: 1.7; color: var(--text-muted); }

        /* ── CHECKLIST ── */
        .checklist { display: flex; flex-direction: column; gap: 4px; }
        .check-item {
            display: flex; align-items: flex-start; gap: 8px; padding: 9px 12px;
            background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm);
            cursor: pointer; transition: all .12s; outline: none;
        }
        .check-item:hover, .check-item:focus-visible { border-color: var(--border2); background: #fff; }
        .check-item.checked { border-color: rgba(14,168,110,.3); background: var(--accent2-light); }
        .check-box {
            width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--border2);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; margin-top: 1px; transition: all .12s; font-size: 10px;
        }
        .check-item.checked .check-box { background: var(--green); border-color: var(--green); color: #fff; }
        .check-text { font-size: 13px; color: var(--text-muted); line-height: 1.4; }
        .check-item.checked .check-text { color: var(--text-dim); text-decoration: line-through; }

        /* ── QUESTIONS ── */
        .questions { display: flex; flex-direction: column; gap: 6px; }
        .q-item {
            padding: 10px 14px 10px 32px; background: var(--accent-light);
            border: 1px solid rgba(26,108,240,.12); border-radius: var(--radius-sm);
            font-size: 13px; line-height: 1.5; color: var(--text); position: relative;
        }
        .q-item::before {
            content: 'Q'; position: absolute; left: 10px; top: 10px;
            font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 500; color: var(--accent);
        }

        /* ── WARN ── */
        .warn-block {
            padding: 12px 14px; background: var(--warn-light);
            border: 1px solid rgba(217,119,6,.2); border-radius: var(--radius-sm);
            font-size: 13px; line-height: 1.6; color: var(--warn); margin-top: 8px;
        }
        .warn-block strong { display: block; margin-bottom: 3px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; font-family: 'DM Mono', monospace; }

        /* ── MOBILE ── */
        .mobile-stage-nav { display:none; padding:12px 16px; gap:6px; overflow-x:auto; scrollbar-width:none; border-bottom:1px solid var(--border); }
        .mobile-stage-btn { flex-shrink:0; padding:6px 12px; border-radius:50px; border:1px solid var(--border); background:var(--surface); color:var(--text-muted); font-size:11px; cursor:pointer; font-family:'DM Sans',sans-serif; transition:all .15s; }
        .mobile-stage-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); font-weight:600; }
        .step-nav-mobile { display:none; position:fixed; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--border); padding:10px 16px; gap:10px; z-index:50; }
        .step-nav-btn { flex:1; padding:10px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--surface2); color:var(--text-muted); font-size:13px; cursor:pointer; font-family:'DM Sans',sans-serif; transition:all .2s; }
        .step-nav-btn.primary { background:var(--accent); color:#fff; border-color:var(--accent); font-weight:500; }
        .step-nav-btn:disabled { opacity:0.28; cursor:not-allowed; pointer-events:none; }

        footer { border-top:1px solid var(--border); padding:16px 24px; text-align:center; font-size:11px; color:var(--text-dim); }

        @media(max-width:768px){
            .mobile-stage-nav { display:flex; }
            .step-nav-mobile { display:flex; }
            header { padding:0 16px; }
            .export-btn span { display:none; }
            .pipeline { display:none; }
            .main { grid-template-columns:1fr; padding:0 16px 60px; }
            .sidebar { display:none; }
            .detail-header, .detail-body { padding:16px; }
        }

        /* ── GLOSSARY MODAL ── */
        .gloss-btn {
            display: flex; align-items: center; gap: 5px; padding: 6px 12px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif;
            font-size: 12px; font-weight: 500; color: var(--text-muted);
            cursor: pointer; transition: all .15s; white-space: nowrap;
        }
        .gloss-btn:hover { border-color: var(--accent); color: var(--accent); }
        .gloss-btn svg { width:13px; height:13px; }

        .modal-overlay {
            display: none; position: fixed; inset: 0; z-index: 500;
            background: rgba(0,0,0,.35); backdrop-filter: blur(4px);
            align-items: flex-start; justify-content: center; padding: 40px 16px;
        }
        .modal-overlay.open { display: flex; }

        .modal-box {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); box-shadow: 0 20px 60px rgba(0,0,0,.15);
            width: 100%; max-width: 760px; max-height: 80vh;
            display: flex; flex-direction: column; animation: fadeUp .18s ease;
        }
        .modal-head {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
        }
        .modal-head-left { display: flex; flex-direction: column; gap: 2px; }
        .modal-title-ru { font-size: 14px; font-weight: 600; color: var(--text); }
        .modal-title-zh { font-size: 12px; color: var(--text-muted); }
        .modal-close {
            width: 28px; height: 28px; border-radius: 6px;
            border: 1px solid var(--border); background: var(--surface2);
            cursor: pointer; font-size: 14px; color: var(--text-muted);
            display: flex; align-items: center; justify-content: center;
            transition: all .12s; font-family: monospace;
        }
        .modal-close:hover { background: var(--border); color: var(--text); }

        .modal-search-wrap { padding: 12px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .modal-search {
            width: 100%; padding: 7px 12px; border: 1px solid var(--border);
            border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif;
            font-size: 13px; background: var(--bg); color: var(--text); outline: none;
            transition: border-color .15s;
        }
        .modal-search:focus { border-color: var(--accent); }

        .modal-body {
            overflow-y: auto; padding: 12px 20px 20px;
            display: flex; flex-direction: column; gap: 4px;
        }

        .gloss-flat-item { padding: 12px 2px; border-bottom: 1px solid var(--border); }
        .gloss-flat-item:last-child { border-bottom: none; }
        .gloss-flat-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 5px; flex-wrap: wrap; }
        .gloss-flat-name { font-size: 13px; font-weight: 600; color: var(--text); }
        .gloss-flat-def { font-size: 12px; line-height: 1.65; color: var(--text-muted); }

        .gloss-abbr {
            font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500;
            color: var(--accent); background: var(--accent-light);
            border: 1px solid rgba(26,108,240,.15); padding: 2px 8px;
            border-radius: 4px; flex-shrink: 0; min-width: 60px; text-align: center;
        }
        .gloss-none { text-align: center; padding: 30px; color: var(--text-dim); font-size: 13px; }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <div class="logo-text">
            <div class="logo-title" id="logo-title">建设阶段导航</div>
            <div class="logo-sub" id="logo-sub">工业建设 · 俄罗斯联邦</div>
        </div>
    </div>
    <div class="header-right">
        <button class="export-btn" onclick="window.exportExcel()">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M2 10v4h12v-4M8 2v8M5 7l3 3 3-3"/>
            </svg>
            <span id="export-label">导出报告</span>
        </button>
        <button class="gloss-btn" onclick="window.openGloss()">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M2 3h7M2 6h5M2 9h4"/>
                <rect x="7" y="6" width="7" height="8" rx="1.5"/>
                <path d="M9.5 9h2M9.5 11.5h2"/>
            </svg>
            <span id="gloss-btn-label">词典</span>
        </button>
        <div class="lang-switch">
            <button class="lang-btn" data-lang="ru" onclick="window.setLang('ru')">Русский</button>
            <button class="lang-btn active" data-lang="zh" onclick="window.setLang('zh')">中文</button>
        </div>
    </div>
</header>

<nav class="mobile-stage-nav" id="mobileStageNav"></nav>

<nav class="pipeline" id="pipeline"></nav>

<main class="main">
    <aside class="sidebar">
        <div class="sidebar-title" id="sidebar-title">阶段步骤</div>
        <div class="step-list" id="stepList"></div>
    </aside>
    <section id="detailPanel"></section>
</main>

<nav class="step-nav-mobile">
    <button class="step-nav-btn" onclick="window.navigate(-1)" id="btn-prev">← 上一步</button>
    <button class="step-nav-btn primary" onclick="window.navigate(1)" id="btn-next">下一步 →</button>
</nav>

<footer>
    <span id="footer-text">规范依据：城市规划法典 · 土地法典 · 民法典 · 联邦法218 · 221 · 174 · 政府决议87 · 145 · 468 · СП48 · 来源：consultant.ru</span>
</footer>

<div class="modal-overlay" id="glossModal" onclick="if(event.target===this) window.closeGloss()">
    <div class="modal-box">
        <div class="modal-head">
            <div class="modal-head-left">
                <div class="modal-title-ru">Глоссарий терминов</div>
                <div class="modal-title-zh">建筑术语词典</div>
            </div>
            <button class="modal-close" onclick="window.closeGloss()">✕</button>
        </div>
        <div class="modal-search-wrap">
            <input class="modal-search" id="glossSearch" type="text"
                placeholder="Поиск / 搜索…" oninput="window.renderGloss()" autocomplete="off">
        </div>
        <div class="modal-body" id="glossBody"></div>
    </div>
</div>

<!-- Блокирующий рендер скрипт убран вниз -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>
(function() {
    const LAWS = {
        grk: {url:'https://www.consultant.ru/document/cons_doc_LAW_51040/', label:'ГрК РФ'},
        zk: {url:'https://www.consultant.ru/document/cons_doc_LAW_33773/', label:'ЗК РФ'},
        gk1: {url:'https://www.consultant.ru/document/cons_doc_LAW_5142/', label:'ГК РФ ч.1'},
        gk2: {url:'https://www.consultant.ru/document/cons_doc_LAW_9027/', label:'ГК РФ ч.2'},
        fz218:{url:'https://www.consultant.ru/document/cons_doc_LAW_182661/', label:'ФЗ-218'},
        fz221:{url:'https://www.consultant.ru/document/cons_doc_LAW_69633/', label:'ФЗ-221'},
        fz174:{url:'https://www.consultant.ru/document/cons_doc_LAW_8515/', label:'ФЗ-174'},
        fz384:{url:'https://www.consultant.ru/document/cons_doc_LAW_95720/', label:'ФЗ-384'},
        pp87: {url:'https://www.consultant.ru/document/cons_doc_LAW_75571/', label:'ПП №87'},
        pp145:{url:'https://www.consultant.ru/document/cons_doc_LAW_66916/', label:'ПП №145'},
        pp468:{url:'https://www.consultant.ru/document/cons_doc_LAW_101587/', label:'ПП №468'},
        pp861:{url:'https://www.consultant.ru/document/cons_doc_LAW_91543/', label:'ПП №861'},
        pp808:{url:'https://www.consultant.ru/document/cons_doc_LAW_81806/', label:'ПП №808'},
        fz416:{url:'https://www.consultant.ru/document/cons_doc_LAW_121895/', label:'ФЗ-416'},
        sp48: {url:'https://docs.cntd.ru/document/554403782', label:'СП 48'},
        pp694:{url:'https://www.consultant.ru/document/cons_doc_LAW_477802/', label:'ПП №694'},
        fz7: {url:'https://www.consultant.ru/document/cons_doc_LAW_34823/', label:'ФЗ-7'},
        fz116:{url:'https://www.consultant.ru/document/cons_doc_LAW_23056/', label:'ФЗ-116'},
        fz123:{url:'https://www.consultant.ru/document/cons_doc_LAW_78699/', label:'ФЗ-123'},

    function parseLaw(str){

            zh:{name:'设计文件及勘察成果国家鉴定',desc:'对于未纳入城市规划法典第49条第2款豁免范围的所有永久性建筑均为强制要求。审查期限为42个工作日（2025年起不再允许多次延期）。审查通过后出具鉴定正面结论（ЗОЭ）——没有该结论将无法获得施工许可证（РС）。',time:'42个工作日（法定）；实际约2–4个月',who:'国家鉴定机构（联邦主鉴定局或地方鉴定机构）',law:'城市规划法典第49条 [grk]; 政府决议第145号 [pp145]',checks:['已取得国家鉴定正面结论（ЗОЭ）','ЗОЭ由该项目类型的有权机构出具','鉴定正面结论（ЗОЭ）有效——取得结论后设计文件未经修改','如有变更——已对变更部分完成补充鉴定（повторная экспертиза）'],questions:['是否已取得鉴定正面结论（ЗОЭ）？请提供文号及日期。','负责鉴定的是哪个机构——联邦主鉴定局还是地方鉴定机构？','取得鉴定正面结论（ЗОЭ）后，设计文件是否进行过修改？','如尚未通过鉴定——目前处于审查哪个阶段，存在哪些意见？'],warn:{zh:'鉴定负面结论（отрицательное заключение）将直接阻断施工许可证的发放。整改意见并重新提交通常需要额外1—3个月。',ru:'Отрицательное заключение экспертизы блокирует выдачу разрешения на строительство. Устранение замечаний и повторная подача занимают 1–3 месяца дополнительно.'}},
            ru:{name:'Государственная экспертиза ПД и результатов изысканий',desc:'Обязательна для всех объектов капитального строительства, не включённых в перечень исключений ГрК ст. 49 ч. 2. Срок — 42 рабочих дня (с 2025 года без возможности неоднократного продления). По итогам выдаётся положительное заключение экспертизы (ЗОЭ).',time:'42 рабочих дня (закон); реально 2–4 мес.',who:'Государственная экспертиза (Главгосэкспертиза или региональная)',law:'ГрК РФ ст. 49 [grk]; ПП РФ №145[pp145]',checks:['Получено положительное заключение государственной экспертизы (ЗОЭ)','ЗОЭ выдано органом, уполномоченным для данного объекта','Заключение действует — ПД не изменялась после его получения','В случае изменений — выполнена повторная экспертиза изменённых разделов'],questions:['Получено ли положительное заключение экспертизы? Предоставьте его реквизиты.','Какой орган проводил экспертизу — Главгосэкспертиза или региональная?','Вносились ли изменения в ПД после получения ЗОЭ?','Если экспертиза не пройдена — на каком этапе рассмотрение, какие замечания?'],warn:{zh:'鉴定负面结论（отрицательное заключение）将直接阻断施工许可证的发放。整改意见并重新提交通常需要额外1—3个月。',ru:'Отрицательное заключение экспертизы блокирует выдачу разрешения на строительство. Устранение замечаний и повторная подача занимают 1–3 месяца дополнительно.'}}

        {id:'s2e',
        zh:{name:'生态鉴定',short:'生态鉴定'},
        ru:{name:'Экологическая экспертиза',short:'ГЭЭ'},
        steps:[
            {id:'3.1',
            zh:{name:'判断是否需要进行国家生态鉴定（ГЭЭ）',desc:'根据ФЗ-174第11–12条，并非所有建设项目均需进行国家生态鉴定。联邦级ГЭЭ主要适用于：属于I类影响类别的项目（如化工厂、金属冶炼、危险废物处置）；位于特别自然保护区（ООПТ）内或附近的项目；位于水源保护区、贝加尔湖保护区内的项目；以及北极地区项目。地方级ГЭЭ由各联邦主体生态监督机构负责（ФЗ-174第12条）。2024年9月1日起，ФЗ-673/2023对第11条进行了重大修订。',time:'2–4周（仅为预备筛查，不含ГЭЭ申报）',who:'业主、生态咨询公司',law:'联邦法174第11–12条 [fz174]; 联邦法7第32条 [fz7]; 政府决议第694号（2024年） [pp694]',checks:['已明确项目的环境影响类别（I–IV类）','已确认项目是否需要进行联邦级ГЭЭ','已确认项目是否需要进行地方级ГЭЭ','如不需要ГЭЭ——已取得书面确认（备忘录）','如需要ГЭЭ——已明确负责机构（联邦自然资源监督局或地方机构）'],questions:['本项目的环境影响类别（НВОСа）是什么？','项目选址是否位于特别自然保护区、水源保护区或其他敏感地带？','是否已向联邦自然资源监督局（Росприроднадзор）核实ГЭЭ要求？','如不需要ГЭЭ——是否已取得相应确认文件？'],warn:null},
            ru:{name:'Определение необходимости ГЭЭ',desc:'Согласно ст. 11–12 ФЗ-174, ГЭЭ требуется не для всех строительных объектов. Федеральная ГЭЭ обязательна для: объектов I категории НВОС (химпром, металлургия, обращение с опасными отходами); объектов в границах ООПТ федерального значения; объектов в водоохранных зонах, зонах охраны Байкальской природной территории; объектов в Арктической зоне. Региональная ГЭЭ — объекты, отнесённые ст. 12 ФЗ-174 к уровню субъекта. С 01.09.2024 действует новая редакция ст. 11 (ФЗ-673 от 25.12.2023).',time:'2–4 нед. (предварительный отбор, без подачи на ГЭЭ)',who:'Заказчик, экологический консультант',law:'ФЗ-174 ст. 11–12 [fz174]; ФЗ-7 ст. 32 [fz7]; ПП РФ №694 (2024)[pp694]',checks:['Определена категория объекта НВОС (I–IV)','Подтверждена необходимость федеральной ГЭЭ','Подтверждена необходимость региональной ГЭЭ','При отсутствии требования ГЭЭ — получено письменное подтверждение','При наличии требования — определён уполномоченный орган (Росприроднадзор или региональный)'],questions:['Какова категория объекта по НВОС?','Расположен ли объект в границах ООПТ, водоохранных зон или иных чувствительных территорий?','Согласована ли позиция по ГЭЭ с Росприроднадзором?','При отсутствии требования ГЭЭ — есть ли подтверждающее письмо?'],warn:null}
            },
            {id:'3.2',
            zh:{name:'编制环境影响评价（ОВОС）和提交申请',desc:'参加国家生态鉴定（ГЭЭ）的必要条件是提供环境影响评价（ОВОС）材料，这是联邦法第174号第14条规定的强制性文件。环境影响评价（ОВОС）作为设计文件的一部分编制，并须经过公众讨论程序（联邦法第7号第32条）。提交给联邦自然资源监督局（Росприроднадзор）或地方主管机关的材料清单由2024年5月8日第283号部令规定。ГЭЭ审查期限——不超过6个月（有减期规定）。',time:'3–6个月',who:'设计院（ОВОС）、联邦自然资源监督局（Росприроднадзор）',law:'联邦法174第14条[fz174]; 联邦法7第32条 [fz7]; 自然资源部令第283号（2024年5月） [fz174]',checks:['已编制环境影响评价（ОВОС）并完成公众讨论','已准备好ГЭЭ全套申请材料（依据2024年第283号部令）','已向有权机关提交材料','已缴纳ГЭЭ费用（依据ФЗ-174第28条）','已取得ГЭЭ正面结论','ГЭЭ结论有效——设计文件未在获得结论后进行修改'],questions:['是否已完成环境影响评价（ОВОС）及公众讨论？','是否已提交ГЭЭ申请？当前审查处于哪个阶段？','审查期限是否有被中止的风险（材料不完整）？','如已获得ГЭЭ结论——是否在取得结论后对设计文件进行过修改？'],warn:{zh:'在法律有明确要求的情况下缺少国家生态鉴定（ГЭЭ）正面结论，属于行政违法行为（行政违法法典第8.4条），最高罚款可达100万卢布，且整个项目将被叫停。该结论在整个施工期间均须保持有效状态。',ru:'Отсутствие положительного заключения ГЭЭ при наличии такого требования — административное правонарушение по ст. 8.4 КоАП РФ, штраф до 1 млн руб., приостановление деятельности. Заключение должно оставаться действительным на весь период строительства.'}},
            ru:{name:'Подготовка ОВОС и прохождение ГЭЭ',desc:'Обязательное условие прохождения ГЭЭ — материалы ОВОС (оценки воздействия на окружающую среду), предусмотренные ст. 14 ФЗ-174. ОВОС разрабатывается в составе ПД и проходит общественное обсуждение (ст. 32 ФЗ-7). Состав материалов для подачи в Росприроднадзор или региональный орган определён Приказом Минприроды №283 от 08.05.2024. Срок ГЭЭ — не более 6 месяцев (с правом сокращения).',time:'3–6 мес.',who:'Проектная организация (ОВОС), Росприроднадзор или региональный орган',law:'ФЗ-174 ст. 14 [fz174]; ФЗ-7 ст. 32 [fz7]; ПП РФ №694 (2024)[pp694]',checks:['ОВОС разработан и прошёл общественное обсуждение','Подготовлен полный комплект документов для ГЭЭ (по Приказу №283/2024)','Материалы поданы в уполномоченный орган','Оплачен сбор за проведение ГЭЭ (ст. 28 ФЗ-174)','Получено положительное заключение ГЭЭ','Заключение ГЭЭ действует — ПД не изменялась после его получения'],questions:['Разработан ли ОВОС и проведено ли общественное обсуждение?','Подана ли заявка на ГЭЭ? На каком этапе рассмотрение?','Есть ли риск приостановления срока (неполнота материалов)?','Если заключение получено — вносились ли изменения в ПД после его получения?'],warn:{zh:'在法律有明确要求的情况下缺少国家生态鉴定（ГЭЭ）正面结论，属于行政违法行为（行政违法法典第8.4条），最高罚款可达100万卢布，且整个项目将被叫停。该结论在整个施工期间均须保持有效状态。',ru:'Отсутствие положительного заключения ГЭЭ при наличии такого требования — административное правонарушение по ст. 8.4 КоАП РФ, штраф до 1 млн руб., приостановление деятельности. Заключение должно оставаться действительным на весь период строительства.'}}
            }
        ]
        },

        steps:[
            {id:'4.1',
            zh:{name:'取得施工许可证（РС）',desc:'施工许可证是开始实体施工的法律依据，由地方自治机关颁发。有效期由施工组织方案（ПОС）确定。重要提示：自2026年3月1日起，城市规划法典第51条将有重大修订（联邦法304号，2025年7月31日）。',time:'5个工作日（法定）；实际1–2个月',who:'地方自治机关或有权机关',law:'城市规划法典第51条 [grk]',checks:['已取得施工许可证','施工许可证有效期足以完成建设','施工许可证由有权机关颁发','施工许可证中载明的项目参数正确无误'],questions:['是否已取得施工许可证？请提供副本。','施工许可证有效期至何时？是否与规划工期相符？','如尚未取得施工许可证——障碍在哪里？','施工许可证是否与当前版本的设计文件相对应？'],warn:{zh:'自2026年3月1日起，城市规划法典第51条按新修订版本执行（联邦法第304号，2025年7月31日）。在此日期前已颁发的施工许可证（РС）按原条件继续有效。',ru:'С 01.03.2026 ст. 51 ГрК РФ действует в новой редакции (ФЗ-304 от 31.07.2025). РС, выданные до этой даты, действуют на прежних условиях.'}},
            ru:{name:'Получение разрешения на строительство (РС)',desc:'Разрешение на строительство — финальный документ, открывающий право на физическое строительство. Выдаётся органом местного самоуправления. Срок действия определяется ПОС. С 01.03.2026 вступают в силу изменения ст. 51 ГрК РФ.',time:'5 раб. дней (закон); реально 1–2 мес.',who:'Орган местного самоуправления или уполномоченный орган',law:'ГрК РФ ст. 51 [grk]',checks:['Получено разрешение на строительство','Срок действия РС достаточен для завершения строительства','РС выдано надлежащим уполномоченным органом','В РС указаны корректные параметры объекта'],questions:['Получено ли разрешение на строительство? Предоставьте копию.','Каков срок действия РС? Соответствует ли он планируемым срокам строительства?','Если РС не получено — что является препятствием?','Соответствует ли РС текущей версии проектной документации?'],warn:{zh:'自2026年3月1日起，城市规划法典第51条按新修订版本执行（联邦法第304号，2025年7月31日）。在此日期前已颁发的施工许可证（РС）按原条件继续有效。',ru:'С 01.03.2026 ст. 51 ГрК РФ действует в новой редакции (ФЗ-304 от 31.07.2025). РС, выданные до этой даты, действуют на прежних условиях.'}}
            }
        ]
        },
        {id:'s4',
        zh:{name:'施工阶段',short:'施工'},
        ru:{name:'Строительство',short:'Строительство'},
        steps:[
            {id:'5.1',
            zh:{name:'开工通知及建设监理',desc:'施工开始前，业主须向国家建设监督局（Госстройнадзор）提交开工通知，并确保建设监理工作的开展。建设监理由业主和承包方按政府决议第468号要求共同执行。总承包商须为建筑类自律监管组织（СРО）成员。',time:'贯穿整个施工过程',who:'业主、总承包商（СРО成员）、国家建设监督局',law:'城市规划法典第52条 [grk]; 政府决议第468号 [pp468]; СП 48规范 [sp48]',checks:['已向国家建设监督局提交开工通知','已签署总承包合同','总承包商具有建筑类自律监管组织（СРО）成员资格','已指定建设监理负责人','已开立工程总日志（КС-6格式（工程总日志））','已取得土方作业许可（如需）'],questions:['是否已提交开工通知？提交时间？','谁是总承包商？请提供自律监管组织（СРО）资质信息。','是否在记录施工总日志？能否查阅最近的记录？','业主方是否在现场设有技术监督人员？','国家建设监督局是否已进行过检查？是否有整改通知？'],warn:null},
            ru:{name:'Извещение о начале работ и строительный контроль',desc:'До начала строительства заказчик обязан направить извещение в Госстройнадзор и обеспечить ведение строительного контроля в соответствии с ПП РФ №468. Генеральный подрядчик должен быть членом СРО строителей.',time:'Постоянно в ходе строительства',who:'Заказчик, генподрядчик (член СРО), Госстройнадзор',law:'ГрК РФ ст. 52 [grk]; ПП РФ №468[pp468]; СП 48.13330.2019 [sp48]',checks:['Направлено извещение о начале строительства в Госстройнадзор','Заключён договор генерального подряда','Генподрядчик имеет членство в СРО строителей','Назначен ответственный за строительный контроль','Открыт общий журнал работ (форма КС-6)','На объект выдан ордер на земляные работы (при необходимости)'],questions:['Направлено ли извещение о начале работ? Когда?','Кто является генеральным подрядчиком? Предоставьте данные СРО-допуска.','Ведётся ли общий журнал работ?','Назначен ли технический надзор от заказчика?','Проводились ли проверки Госстройнадзора? Есть ли предписания?'],warn:null}
            },
            {id:'5.2',
            zh:{name:'设计监督与竣工技术档案',desc:'设计监督（авторский надзор）由设计方在施工过程中实施，对通过国家鉴定的项目为强制要求（城市规划法典第52条第2款）。竣工技术档案记录所有隐蔽工程的实际参数，是竣工验收的依据。',time:'贯穿整个施工过程',who:'设计院（设计监督）、总承包商（竣工档案）',law:'城市规划法典第52条第2款 [grk]; СП 48规范第5节 [sp48]',checks:['已与设计方签署设计监督合同','设计监督日志正在记录中','隐蔽工程验收记录正在办理','已完成已施工构件的竣工测量','竣工技术档案已妥善保存并系统整理'],questions:['是否已与设计方签署设计监督合同？','设计监督日志是否在记录？设计方现场巡查的频率如何？','竣工技术档案如何管理——是否有专职负责人？','所有隐蔽工程是否均已完成验收记录？'],warn:null},
            ru:{name:'Авторский надзор и исполнительная документация',desc:'Авторский надзор осуществляется проектировщиком в ходе строительства и является обязательным для объектов, проходящих госэкспертизу (ГрК ст. 52 ч. 2). Исполнительная документация фиксирует фактические параметры всех скрытых работ.',time:'В ходе всего строительства',who:'Проектная организация (авт. надзор), генподрядчик (исп. документация)',law:'ГрК РФ ст. 52 ч. 2 [grk]; СП 48.13330.2019 разд. 5 [sp48]',checks:['Заключён договор на авторский надзор с проектировщиком','Ведётся журнал авторского надзора','Оформляются акты освидетельствования скрытых работ','Ведётся исполнительная съёмка по выполненным конструкциям','Исполнительная документация хранится и систематизирована'],questions:['Заключён ли договор на авторский надзор с проектировщиком?','Ведётся ли журнал авторского надзора?','Как организовано ведение исполнительной документации?','Все ли скрытые работы освидетельствованы актами?'],warn:null}

            {id:'5.3',

            ru:{name:'Пожарная безопасность и ОПО',desc:'Промышленные объекты обязаны иметь раздел пожарной безопасности (раздел 9 ПД) в соответствии с ФЗ-123. Если объект относится к опасным производственным объектам (ОПО по ФЗ-116), дополнительно требуется декларация промышленной безопасности и регистрация в Ростехнадзоре. Проверяется соответствие систем фактически реализованным проектным решениям.',time:'В ходе строительства',who:'Проектная организация (разд. 9), заказчик (регистрация ОПО)',law:'ФЗ-123 (тех. регламент пожарной безопасности) [fz123]; ФЗ-116 (пром. безопасность) [fz116]; ГрК РФ ст. 49 [grk]',checks:['Раздел 9 ПД (пожарная безопасность) прошёл госэкспертизу','Системы пожаротушения смонтированы по ПД','При отнесении к ОПО — объект зарегистрирован в Ростехнадзоре','При отнесении к ОПО — разработана декларация промышленной безопасности','Обеспечено наружное противопожарное водоснабжение (гидранты, пирсы)','Пути эвакуации реализованы по ПД'],questions:['Относится ли объект к опасным производственным объектам (ОПО)?','Зарегистрирован ли объект в Ростехнадзоре как ОПО?','Смонтированы ли системы пожарной сигнализации, АУПТ, дымоудаления?','Проводились ли предварительные проверки пожарного надзора?'],warn:null}

            ru:{name:'Подтверждение действия заключения ГЭЭ (при наличии)',desc:'Если объект проходил ГЭЭ, перед подачей на РВЭ необходимо убедиться в действительности заключения. Если ПД изменялась после его получения — требуется повторная ГЭЭ (ст. 14 ФЗ-174). Росприроднадзор вправе запросить данные экологического мониторинга строительного периода для подтверждения соответствия материалам экспертизы.',time:'За 2–4 нед. до подачи на РВЭ',who:'Заказчик, Росприроднадзор',law:'ФЗ-174 ст. 14 [fz174]; ГрК РФ ст. 55 [grk]',checks:['Действительность заключения ГЭЭ подтверждена (при наличии)','При необходимости — выполнена повторная ГЭЭ','Данные экологического мониторинга строительного периода собраны','Выполнены мероприятия по восстановлению среды (при требованиях ГЭЭ)','Копия заключения ГЭЭ включена в пакет документов на РВЭ'],questions:['Заключение ГЭЭ действует на дату подачи на РВЭ?','Вносились ли изменения в ПД после получения заключения ГЭЭ?','Ведётся ли журнал экологического мониторинга стройплощадки?','Проводил ли Росприроднадзор проверки в ходе строительства? Есть ли предписания?'],warn:null}

            ru_full:'Госстройнадзор',
            zh_full:'国家建设监督局',
            ru_def:'Государственный строительный надзор. Принимает извещения о начале строительства, проводит проверки в ходе строительства, выдаёт заключение о соответствии (ЗОС) перед получением РВЭ. Основание: ГрК РФ ст. 54.',
            zh_def:'俄罗斯国家建设监督机构。受理开工通知、在施工期间开展检查，并在竣工验收许可证（РВЭ）颁发前出具合规结论（ЗОС）。依据：城市规划法典第54条。'
        },
        {
            abbr:null,
            ru_full:'Роспотребнадзор',
            zh_full:'联邦消费者权益保护和公益监督局',
            ru_def:'Федеральная служба по надзору в сфере защиты прав потребителей и благополучия человека. Согласовывает установление санитарно-защитных зон (СЗЗ), выдаёт санитарно-эпидемиологические заключения.',
            zh_def:'俄罗斯联邦消费者权益保护和公共卫生监督服务局。负责审批卫生防护区（СЗЗ）划定，颁发卫生防疫结论文件。'
        }
    ];

    // ─── STATE ────────────────────────────────────────────────────────────────────
    let lang = 'zh', activeStage = 0, activeStep = 0, checked = {};

    try {
        const savedState = localStorage.getItem('construction-checked');
        if (savedState) {
            const parsed = JSON.parse(savedState);
            for (let k in parsed) {
                checked[k] = new Set(parsed[k]);
            }
        }
    } catch(e) {
        console.error('Failed to load state', e);
    }

    function saveState() {
        const objToSave = {};
        for(let key in checked) {
            if (checked[key].size > 0) {
                objToSave[key] = Array.from(checked[key]);
            }
        }
        localStorage.setItem('construction-checked', JSON.stringify(objToSave));
    }

    function getChecked(id) {
        if(!checked[id]) checked[id] = new Set();
        return checked[id];
    }

    // ─── LANG ─────────────────────────────────────────────────────────────────────
    function setLang(l) {
        lang = l;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === l));
        document.documentElement.lang = l === 'zh' ? 'zh-CN' : 'ru';
        const u = UI[l];
        document.getElementById('logo-title').textContent = u.logoTitle;
        document.getElementById('logo-sub').textContent = u.logoSub;
        document.getElementById('sidebar-title').textContent = u.sidebarTitle;
        document.getElementById('btn-prev').textContent = u.btnPrev;
        document.getElementById('btn-next').textContent = u.btnNext;
        document.getElementById('export-label').textContent = u.exportLabel;
        document.getElementById('footer-text').textContent = u.footer;
        document.getElementById('gloss-btn-label').textContent = l === 'zh' ? '词典' : 'Словарь';
        render();
    }

    // ─── LAW BADGES ───────────────────────────────────────────────────────────────
    function renderLawBadges(lawStr) {
        return parseLaw(lawStr).map(item => {
            const law = item.key ? LAWS[item.key] : null;
            if (law) return `<a class="badge badge-law" href="${law.url}" target="_blank" rel="noopener" title="${law.label} — consultant.ru">📋 ${item.text}</a>`;
            return `<span class="badge badge-law">📋 ${item.text}</span>`;
        }).join('');
    }

    // ─── EXCEL EXPORT ─────────────────────────────────────────────────────────────
    function exportExcel() {
        if (typeof XLSX === 'undefined') {
            alert('Библиотека Excel еще не загружена / Excel库尚未加载');
            return;
        }

        const u = UI[lang];
        const rows = [[u.excelTitle, '', '', '', '', '', '']];
        rows.push(['']);
        rows.push([u.colStage, u.colStep, u.colName, u.colTime, u.colStatus, u.colDone, u.colTotal]);

        DATA.stages.forEach(stage => {
            stage.steps.forEach(step => {
                const d = step[lang];
                const c = getChecked(step.id);
                const total = d.checks.length, done = c.size;
                let status = u.statusPending;
                
                if (done === total && total > 0) status = u.statusDone;
                else if (done > 0) status = u.statusPartial;
                
                rows.push([stage[lang].name, step.id, d.name, d.time, status, done, total]);

                d.checks.forEach((chk, i) => {
                    rows.push(['', '', ' ' + (c.has(i) ? '☑' : '☐') + ' ' + chk, '', '', '', '']);
                });
                rows.push(['', '', '', '', '', '', '']);
            });
        });

        const ws = XLSX.utils.aoa_to_sheet(rows);
        ws['!cols'] =[{wch:22}, {wch:8}, {wch:52}, {wch:20}, {wch:14}, {wch:10}, {wch:10}];
        ws['!merges'] =[{s:{r:0,c:0}, e:{r:0,c:6}}];

        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, lang === 'zh' ? '项目状态' : 'Статус проекта');
        const date = new Date().toISOString().slice(0,10);
        XLSX.writeFile(wb, `construction-navigator-${date}.xlsx`);
    }

    // ─── RENDER ───────────────────────────────────────────────────────────────────
    function render() {
        renderPipeline();
        renderMobileStageNav();
        renderStepList();
        renderDetail();
        updateNavButtons();
    }

    function renderPipeline() {
        const html = DATA.stages.map((s, i) => {
            const dots = s.steps.map(step => {
                const c = getChecked(step.id);
                const total = step[lang].checks.length;
                const done = c.size;
                let cls = '';
                if (total > 0 && done === total) cls = 'done';
                else if (done > 0) cls = 'partial';
                return `<span class="${cls}"></span>`;
            }).join('');
            
            return `
                <div class="pipe-stage ${i === activeStage ? 'active' : ''}" role="button" tabindex="0" onclick="window.selectStage(${i})" onkeydown="if(event.key==='Enter'||event.key===' ') { event.preventDefault(); window.selectStage(${i}); }">
                    <div class="pipe-stage-inner">
                        <div class="pipe-num">0${i+1}</div>
                        <div class="pipe-label">${s[lang].short}</div>
                        <div class="pipe-dot">${dots}</div>
                    </div>
                </div>`;
        }).join('');
        document.getElementById('pipeline').innerHTML = html;
    }

    function renderMobileStageNav() {
        const html = DATA.stages.map((s, i) => 
            `<button class="mobile-stage-btn ${i === activeStage ? 'active' : ''}" onclick="window.selectStage(${i})">${i+1}. ${s[lang].short}</button>`
        ).join('');
        document.getElementById('mobileStageNav').innerHTML = html;
    }

    function renderStepList() {
        const stage = DATA.stages[activeStage];
        const html = stage.steps.map((step, i) => {
            const c = getChecked(step.id);
            const total = step[lang].checks.length;
            const done = c.size;
            let sc = 'pending', si = '';
            
            if (done === total && total > 0) { 
                sc = 'done'; si = '✓'; 
            } else if (done > 0) { 
                sc = 'warn'; si = done; 
            }
            
            return `
                <div class="step-item ${i === activeStep ? 'active' : ''}" role="button" tabindex="0" onclick="window.selectStep(${i})" onkeydown="if(event.key==='Enter'||event.key===' ') { event.preventDefault(); window.selectStep(${i}); }">
                    <div class="step-status ${sc}">${si}</div>
                    <div class="step-info">
                        <div class="step-code">${step.id}</div>
                        <div class="step-name">${step[lang].name}</div>
                        <div class="step-time">${step[lang].time}</div>
                    </div>
                </div>`;
        }).join('');
        document.getElementById('stepList').innerHTML = html;
    }

    function renderDetail() {
        const stage = DATA.stages[activeStage];
        const step = stage.steps[activeStep];
        const d = step[lang];
        const c = getChecked(step.id);
        const u = UI[lang];

        const total = d.checks.length;
        const done = c.size;
        const pct = total > 0 ? Math.round(done / total * 100) : 0;

        const checksHtml = d.checks.map((txt, i) => {
            const isChecked = c.has(i);
            return `
                <div class="check-item ${isChecked ? 'checked' : ''}" role="button" tabindex="0" onclick="window.toggleCheck('${step.id}', ${i})" onkeydown="if(event.key==='Enter'||event.key===' ') { event.preventDefault(); window.toggleCheck('${step.id}', ${i}); }">
                    <div class="check-box">${isChecked ? '✓' : ''}</div>
                    <div class="check-text">${txt}</div>
                </div>`;
        }).join('');

        const questionsHtml = d.questions.map(q => `<div class="q-item">${q}</div>`).join('');
        const warnHtml = d.warn ? `<div class="warn-block"><strong>${u.warnLabel}</strong>${d.warn[lang]}</div>` : '';
        const badgesHtml = renderLawBadges(d.law);

        document.getElementById('detailPanel').innerHTML = `
            <div class="detail">
                <div class="detail-header">
                    <div class="detail-stage-tag">${u.stageLabel} ${activeStage + 1} · ${stage[lang].name}</div>
                    <div class="detail-title">${step.id}. ${d.name}</div>
                    <div class="detail-meta">
                        <span class="badge badge-time">⏱ ${d.time}</span>
                        <span class="badge badge-who">👤 ${d.who}</span>
                        ${badgesHtml}
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${pct}%"></div>
                    </div>
                </div>
                <div class="detail-body">
                    <div class="section-label">${u.sectionDesc}</div>
                    <div class="desc-text">${d.desc}</div>
                    ${warnHtml}
                    <div class="section-label">${u.sectionChecks} · ${done}/${total}</div>
                    <div class="checklist">${checksHtml}</div>
                    <div class="section-label">${u.sectionQuestions}</div>
                    <div class="questions">${questionsHtml}</div>
                </div>
            </div>`;
    }

    function selectStage(i) { 
        activeStage = i; 
        activeStep = 0; 
        render(); 
    }

    function selectStep(i) { 
        activeStep = i; 
        renderStepList(); 
        renderDetail(); 
        updateNavButtons(); 
        if (window.innerWidth <= 768) {
            document.getElementById('detailPanel').scrollIntoView({behavior:'smooth', block:'start'});
        }
    }

    function toggleCheck(id, idx) { 
        const c = getChecked(id); 
        c.has(idx) ? c.delete(idx) : c.add(idx); 
        saveState();
        renderPipeline(); 
        renderStepList(); 
        renderDetail(); 
    }

    function navigate(dir) { 
        const stage = DATA.stages[activeStage];
        const ns = activeStep + dir; 
        if (ns >= 0 && ns < stage.steps.length) { 
            selectStep(ns); 
        } else if (dir > 0 && activeStage < DATA.stages.length - 1) { 
            selectStage(activeStage + 1); 
        } else if (dir < 0 && activeStage > 0) { 
            activeStage--; 
            activeStep = DATA.stages[activeStage].steps.length - 1; 
            render(); 
        } 
    }

    function updateNavButtons() {
        const isFirst = (activeStage === 0 && activeStep === 0);
        const isLast = (activeStage === DATA.stages.length - 1 && activeStep === DATA.stages[activeStage].steps.length - 1);
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        if (btnPrev) btnPrev.disabled = isFirst;
        if (btnNext) btnNext.disabled = isLast;
        if (btnNext) btnNext.classList.toggle('primary', !isLast);
    }

    function openGloss() { 
        document.getElementById('glossModal').classList.add('open'); 
        document.getElementById('glossSearch').value = ''; 
        renderGloss(); 
        document.getElementById('glossSearch').focus(); 
    }

    function closeGloss() { 
        document.getElementById('glossModal').classList.remove('open'); 
    }

    document.addEventListener('keydown', e => { 
        if (e.key === 'Escape') closeGloss(); 
    });

    function renderGloss() {
        const q = document.getElementById('glossSearch').value.toLowerCase();
        const isZh = lang === 'zh';
        const items = GLOSSARY.filter(g => {
            const text =[g.abbr, g.ru_full, g.zh_full, g.ru_def, g.zh_def].filter(Boolean).join(' ').toLowerCase();
            return !q || text.includes(q);
        });

        const body = document.getElementById('glossBody');
        if (!items.length) { 
            body.innerHTML = '<div class="gloss-none">没有找到 / Не найдено</div>'; 
            return; 
        }

        body.innerHTML = items.map(g => {
            const abbr = g.abbr ? `<span class="gloss-abbr">${g.abbr}</span>` : '';
            const fullName = isZh ? g.zh_full : g.ru_full;
            const def = isZh ? g.zh_def : g.ru_def;
            return `
                <div class="gloss-flat-item">
                    <div class="gloss-flat-head">
                        ${abbr}
                        <span class="gloss-flat-name">${fullName}</span>
                    </div>
                    <div class="gloss-flat-def">${def}</div>
                </div>`;
        }).join('');
    }

    // Экспортируем нужные функции в window для доступа из HTML onClick / onKeyDown
    window.setLang = setLang;
    window.exportExcel = exportExcel;
    window.openGloss = openGloss;
    window.closeGloss = closeGloss;
    window.renderGloss = renderGloss;
    window.selectStage = selectStage;
    window.selectStep = selectStep;
    window.toggleCheck = toggleCheck;
    window.navigate = navigate;

    // Первоначальный рендер интерфейса
    render();

})();
</script>
</body>
</html>
