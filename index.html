<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>建设项目导航 / Навигатор строительного проекта</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #f7f7f5;
    --surface: #ffffff;
    --surface2: #f3f4f6;
    --border: #e2e4e9;
    --border2: #d0d3db;
    --accent: #1a6cf0;
    --accent-light: #eff4ff;
    --accent2: #0ea86e;
    --accent2-light: #edfaf5;
    --warn: #d97706;
    --warn-light: #fffbeb;
    --text: #111827;
    --text-muted: #6b7280;
    --text-dim: #9ca3af;
    --green: #0ea86e;
    --orange: #d97706;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    overflow-x: hidden;
  }
  :lang(zh) body, html[lang="zh-CN"] { font-size: 15px; }
  html[lang="zh-CN"] .step-name { font-size: 13.5px; }
  html[lang="zh-CN"] .desc-text { font-size: 14.5px; }
  html[lang="zh-CN"] .check-text { font-size: 14px; }
  html[lang="zh-CN"] .q-item { font-size: 14px; }
  html[lang="zh-CN"] .detail-title { font-size: clamp(15px, 2vw, 19px); }

  /* ── HEADER ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(247,247,245,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex; align-items: center; justify-content: space-between;
    height: 56px;
  }

  .logo {
    display: flex; align-items: center; gap: 10px;
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo-icon svg { width: 18px; height: 18px; }
  .logo-text { line-height: 1.2; }
  .logo-title {
    font-size: 13px; font-weight: 600;
    color: var(--text); letter-spacing: -0.2px;
    max-width: 320px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .logo-sub { font-size: 11px; color: var(--text-muted); }

  .header-right { display: flex; align-items: center; gap: 10px; }

  .lang-switch {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 3px; gap: 2px;
  }
  .lang-btn {
    padding: 5px 14px; border-radius: 50px; border: none;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 500;
    transition: all .15s;
    background: transparent; color: var(--text-muted);
  }
  .lang-btn.active { background: var(--accent); color: #fff; }

  .export-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .export-btn:hover { border-color: var(--accent); color: var(--accent); }
  .export-btn svg { width:14px; height:14px; flex-shrink:0; }

  /* ── PIPELINE ── */
  .pipeline {
    display: flex; max-width: 1100px;
    margin: 0 auto 32px; padding: 0 24px;
    overflow-x: auto; scrollbar-width: none; gap: 0;
  }
  .pipeline::-webkit-scrollbar { display: none; }

  .pipe-stage { flex: 1; min-width: 110px; cursor: pointer; }
  .pipe-stage-inner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-right: none;
    padding: 12px 14px 10px;
    transition: all .15s;
  }
  .pipe-stage:first-child .pipe-stage-inner { border-radius: var(--radius-sm) 0 0 var(--radius-sm); }
  .pipe-stage:last-child .pipe-stage-inner { border-right: 1px solid var(--border); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
  .pipe-stage.active .pipe-stage-inner { background: var(--accent); border-color: var(--accent); }
  .pipe-stage:hover:not(.active) .pipe-stage-inner { background: var(--surface2); }

  .pipe-num {
    font-family: 'DM Mono', monospace;
    font-size: 9px; color: var(--text-dim); margin-bottom: 3px;
  }
  .pipe-stage.active .pipe-num { color: rgba(255,255,255,.6); }
  .pipe-label { font-size: 11px; font-weight: 500; color: var(--text-muted); line-height: 1.3; }
  .pipe-stage.active .pipe-label { color: #fff; font-weight: 600; }
  .pipe-dot { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
  .pipe-dot span { width:9px; height:9px; border-radius:50%; background: var(--border2); flex-shrink:0; }
  .pipe-stage.active .pipe-dot span { background: rgba(255,255,255,.35); }
  .pipe-dot span.done { background: var(--green); }
  .pipe-dot span.partial { background: var(--orange); }
  .pipe-stage.active .pipe-dot span.done { background: #4ade80; }
  .pipe-stage.active .pipe-dot span.partial { background: #fbbf24; }

  /* ── MAIN LAYOUT ── */
  .main {
    max-width: 1100px; margin: 0 auto;
    padding: 0 24px 80px;
    display: grid; grid-template-columns: 280px 1fr;
    gap: 20px; align-items: start;
  }

  /* ── SIDEBAR ── */
  .sidebar { position: sticky; top: 72px; }
  .sidebar-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px; font-weight: 500;
    color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.1em;
    margin-bottom: 8px; padding: 0 4px;
  }
  .step-list { display: flex; flex-direction: column; gap: 2px; }
  .step-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    border: 1px solid transparent;
    transition: all .15s;
  }
  .step-item:hover { background: var(--surface); border-color: var(--border); }
  .step-item.active { background: var(--surface); border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }

  .step-status {
    width: 18px; height: 18px; border-radius: 50%;
    border: 1.5px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 600;
    flex-shrink: 0; margin-top: 1px;
    transition: all .15s;
  }
  .step-status.done { background: var(--green); border-color: var(--green); color: #fff; }
  .step-status.warn { background: var(--orange); border-color: var(--orange); color: #fff; }
  .step-item.active .step-status.pending { border-color: var(--accent); }

  .step-info { flex: 1; min-width: 0; }
  .step-code { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text-dim); margin-bottom: 1px; }
  .step-name { font-size: 12px; font-weight: 500; color: var(--text-muted); line-height: 1.35; }
  .step-item.active .step-name { color: var(--text); }
  .step-time { font-size: 10px; color: var(--text-dim); margin-top: 1px; }

  /* ── DETAIL PANEL ── */
  .detail {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    animation: fadeUp .2s ease;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

  .detail-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .detail-stage-tag {
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 8px;
  }
  .detail-title {
    font-size: clamp(14px, 1.8vw, 17px);
    font-weight: 600; line-height: 1.3;
    color: var(--text); margin-bottom: 6px;
  }
  .detail-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }

  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 9px; border-radius: 50px;
    font-size: 11px; font-weight: 500;
    border: 1px solid; text-decoration: none;
    transition: all .15s; white-space: nowrap;
  }
  .badge-time { color: var(--text-muted); border-color: var(--border); background: var(--surface); }
  .badge-who { color: var(--text-muted); border-color: var(--border); background: var(--surface); }
  .badge-law {
    color: var(--accent); border-color: rgba(26,108,240,.2);
    background: var(--accent-light); cursor: pointer;
    font-family: 'DM Mono', monospace; font-size: 10px;
  }
  .badge-law:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

  .progress-bar { height: 2px; background: var(--border); border-radius: 2px; margin-top: 14px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius:2px; transition: width .4s ease; }

  .detail-body { padding: 20px 24px; }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--text-dim); font-weight: 500;
    margin-bottom: 10px; margin-top: 20px;
  }
  .section-label:first-child { margin-top: 0; }
  .desc-text { font-size: 13px; line-height: 1.7; color: var(--text-muted); }

  /* ── CHECKLIST ── */
  .checklist { display: flex; flex-direction: column; gap: 4px; }
  .check-item {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 9px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer; transition: all .12s;
  }
  .check-item:hover { border-color: var(--border2); background: #fff; }
  .check-item.checked { border-color: rgba(14,168,110,.3); background: var(--accent2-light); }
  .check-box {
    width: 16px; height: 16px; border-radius: 4px;
    border: 1.5px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px; transition: all .12s; font-size: 10px;
  }
  .check-item.checked .check-box { background: var(--green); border-color: var(--green); color: #fff; }
  .check-text { font-size: 13px; color: var(--text-muted); line-height: 1.4; }
  .check-item.checked .check-text { color: var(--text-dim); text-decoration: line-through; }

  /* ── QUESTIONS ── */
  .questions { display: flex; flex-direction: column; gap: 6px; }
  .q-item {
    padding: 10px 14px 10px 32px;
    background: var(--accent-light);
    border: 1px solid rgba(26,108,240,.12);
    border-radius: var(--radius-sm);
    font-size: 13px; line-height: 1.5; color: var(--text);
    position: relative;
  }
  .q-item::before {
    content: 'Q';
    position: absolute; left: 10px; top: 10px;
    font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 500;
    color: var(--accent);
  }

  /* ── WARN ── */
  .warn-block {
    padding: 12px 14px;
    background: var(--warn-light);
    border: 1px solid rgba(217,119,6,.2);
    border-radius: var(--radius-sm);
    font-size: 13px; line-height: 1.6; color: var(--warn);
    margin-top: 8px;
  }
  .warn-block strong { display: block; margin-bottom: 3px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; font-family: 'DM Mono', monospace; }

  /* ── MOBILE ── */
  .mobile-stage-nav { display:none; padding:12px 16px; gap:6px; overflow-x:auto; scrollbar-width:none; border-bottom:1px solid var(--border); }
  .mobile-stage-btn { flex-shrink:0; padding:6px 12px; border-radius:50px; border:1px solid var(--border); background:var(--surface); color:var(--text-muted); font-size:11px; cursor:pointer; font-family:'DM Sans',sans-serif; transition:all .15s; }
  .mobile-stage-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); font-weight:600; }
  .step-nav-mobile { display:none; position:fixed; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--border); padding:10px 16px; gap:10px; z-index:50; }
  .step-nav-btn { flex:1; padding:10px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--surface2); color:var(--text-muted); font-size:13px; cursor:pointer; font-family:'DM Sans',sans-serif; transition:all .2s; }
  .step-nav-btn.primary { background:var(--accent); color:#fff; border-color:var(--accent); font-weight:500; }
  .step-nav-btn:disabled { opacity:0.28; cursor:not-allowed; pointer-events:none; }

  footer { border-top:1px solid var(--border); padding:16px 24px; text-align:center; font-size:11px; color:var(--text-dim); }

  @media(max-width:768px){
    .mobile-stage-nav{display:flex;} .step-nav-mobile{display:flex;}
    header{padding:0 16px;} .export-btn span{display:none;}
    .pipeline{display:none;}
    .main{grid-template-columns:1fr;padding:0 16px 60px;} .sidebar{display:none;}
    .detail-header,.detail-body{padding:16px;}
    .logo-title{max-width:160px;}
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-text">
      <div class="logo-title" id="logo-title">建设导航</div>
      <div class="logo-sub" id="logo-sub">工业建设 · 俄罗斯联邦</div>
    </div>
  </div>
  <div class="header-right">
    <button class="export-btn" onclick="exportExcel()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M2 10v4h12v-4M8 2v8M5 7l3 3 3-3"/>
      </svg>
      <span id="export-label">导出报告</span>
    </button>
    <div class="lang-switch">
      <button class="lang-btn" onclick="setLang('ru')">Русский</button>
      <button class="lang-btn active" onclick="setLang('zh')">中文</button>
    </div>
  </div>
</header>

<div class="mobile-stage-nav" id="mobileStageNav"></div>

</div>

<div class="pipeline" id="pipeline"></div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-title" id="sidebar-title">阶段步骤</div>
    <div class="step-list" id="stepList"></div>
  </div>
  <div id="detailPanel"></div>
</div>

<div class="step-nav-mobile">
  <button class="step-nav-btn" onclick="navigate(-1)" id="btn-prev">← 上一步</button>
  <button class="step-nav-btn primary" onclick="navigate(1)" id="btn-next">下一步 →</button>
</div>

function parseLaw(str){
  return str.split(';').map(s=>{
    const m=s.match(/\[(\w+)\]/);
    return {text:s.replace(/\[\w+\]/,'').trim(), key:m?m[1]:null};
  });
}

    {id:'1.1',

     ru:{name:'Инвестиционное обоснование и концепция',desc:'Определяются цели проекта, укрупнённые параметры объекта, предварительная оценка инвестиций (OPEX/CAPEX), рыночное обоснование. Формируется задание на проектирование.',time:'2–3 мес.',who:'Заказчик, консультанты',law:'ГК РФ ст. 758–762 (договор подряда на проектирование) [gk2]',checks:['Сформулированы цели и технические требования к объекту','Выполнена предварительная оценка инвестиций (CAPEX/OPEX)','Определена организационно-правовая форма реализации проекта','Оформлено задание на проектирование'],questions:['Есть ли утверждённое задание на проектирование (ТЗ)?','Выполнялось ли технико-экономическое обоснование (ТЭО)?','Какова форма собственности объекта?','Определён ли генеральный заказчик и технический заказчик?'],warn:null}
    },
    {id:'1.2',
     zh:{name:'用地选择与权属办理',desc:'综合考虑土地类别、用途许可类型（ВРИ）、物流及基础设施条件选择地块。通过拍卖办理租赁或购买产权，在不动产登记局完成权属登记。',time:'1–3个月',who:'业主、МФЦ、不动产登记局、地方行政机构',law:'土地法典第V.1章第39.1–39.20条 [zk]; 民法典第34–35章 [gk1]; 联邦法218 [fz218]',checks:['已取得ЕГРН摘录，确认地块权属','土地类别与规划建设用途相符（城镇建设用地或工业用地）','用途许可类型（ВРИ）允许工业建设（或已完成ВРИ变更）','地块权属已在不动产登记局完成登记（租赁或所有权）','租赁期限足以完成建设和竣工验收'],questions:['请提供ЕГРН摘录——地块的类别和用途许可类型是什么？','地块权属人是谁——租赁还是所有权？','租赁期限——是否足以完成完整的建设周期？','地块上是否存在负担、地役权或保护区？','是否进行过ВРИ变更？'],warn:{zh:'如果地块的用途许可类型（ВРИ）与规划活动不符，则需要举行公众听证会并获得地方行政部门批准，这可能额外耗时3–6个月。',ru:'Если ВРИ участка не соответствует планируемой деятельности, потребуются публичные слушания и согласование с местной администрацией. Это может занять 3–6 месяцев дополнительно.'}},
     ru:{name:'Выбор и оформление земельного участка',desc:'Выбор участка с учётом категории земли, вида разрешённого использования (ВРИ), логистики и инфраструктуры. Оформление аренды через аукцион либо приобретение в собственность. Регистрация прав в Росреестре.',time:'1–3 мес.',who:'Заказчик, МФЦ, Росреестр, местная администрация',law:'ЗК РФ гл. V.1 (ст. 39.1–39.20) [zk]; ГК РФ гл. 34–35 [gk1]; ФЗ-218 [fz218]',checks:['Получена выписка из ЕГРН с подтверждением прав на участок','Категория земли соответствует планируемому строительству','ВРИ допускает промышленное строительство (либо выполнено изменение ВРИ)','Права на участок зарегистрированы в Росреестре (аренда или собственность)','Срок аренды достаточен для строительства и ввода объекта'],questions:['Предоставьте выписку из ЕГРН — какова категория и ВРИ участка?','Кто является правообладателем участка?','Срок аренды — достаточен ли он для полного строительного цикла?','Есть ли обременения, сервитуты, охранные зоны на участке?','Проводилось ли изменение ВРИ?'],warn:{zh:'如果地块的用途许可类型（ВРИ）与规划活动不符，则需要举行公众听证会并获得地方行政部门批准，这可能额外耗时3–6个月。',ru:'Если ВРИ участка не соответствует планируемой деятельности, потребуются публичные слушания и согласование с местной администрацией. Это может занять 3–6 месяцев дополнительно.'}}
    },
    {id:'1.3',
     zh:{name:'ГПЗУ——地块城建规划条件书',desc:'由地方自治机关根据地块权属人申请出具的文件。规定建设许可参数：最大建筑高度、建筑密度、退界距离（红线）及保护区信息。是设计和申请施工许可证的必要前提文件，自签发之日起有效期3年。',time:'14个工作日（法定）',who:'地方自治机关（通过政务服务门户或МФЦ办理）',law:'城市规划法典第57.3条 [grk]',checks:['已取得ГПЗУ且仍在有效期内（未超过3年）','ГПЗУ在完成地块权属登记后取得','ГПЗУ参数与规划项目相符（建筑高度、建筑密度）','ГПЗУ中已反映所有保护区及限制条件'],questions:['请提供ГПЗУ——签发日期是何时？3年有效期是否已到期？','ГПЗУ的参数是否与规划项目的高度和密度要求相符？','ГПЗУ中是否存在保护区限制（高压线、天然气管道、卫生防护区）？','如尚未取得ГПЗУ——目前处于办理的哪个环节？'],warn:null},
     ru:{name:'ГПЗУ — Градостроительный план земельного участка',desc:'Документ, выдаваемый органом местного самоуправления. Фиксирует разрешённые параметры строительства: максимальную высотность, процент застройки, отступы от границ, сведения об охранных зонах. Действителен 3 года.',time:'14 рабочих дней (по закону)',who:'Орган местного самоуправления (через Госуслуги или МФЦ)',law:'ГрК РФ ст. 57.3 [grk]',checks:['ГПЗУ получен и действует (не истёк 3-летний срок)','ГПЗУ выдан после оформления прав на участок','Параметры ГПЗУ соответствуют планируемому объекту','В ГПЗУ отражены все охранные зоны и ограничения'],questions:['Предоставьте ГПЗУ — какова дата выдачи? Не истёк ли 3-летний срок?','Соответствуют ли параметры ГПЗУ планируемому проекту?','Есть ли в ГПЗУ ограничения по охранным зонам?','При отсутствии ГПЗУ — на каком этапе находится его получение?'],warn:null}
    },
    {id:'1.4',
     zh:{name:'ППТ/ПМТ——片区规划文件',desc:'片区规划方案（ППТ）在大型地块开发、线性工程建设或法律有明确要求时才需要编制。对于大多数独立工业厂房，无需编制ППТ。',time:'4–6个月',who:'地方行政机构、设计院',law:'城市规划法典第42–46条 [grk]',checks:['已确认本项目是否需要编制ППТ','如已有ППТ——已由地方行政机构批准','地块边界无需调整（地籍测量为最新状态）'],questions:['本项目是否需要编制ППТ？','如ППТ已获批——请提供批准决定的文号及日期。','地块形状是否满足项目需求，还是需要分割或合并？'],warn:null},
     ru:{name:'ППТ / ПМТ — Планировка территории',desc:'Проект планировки территории (ППТ) необходим при освоении крупных земельных массивов или строительстве линейных объектов. Для большинства отдельно стоящих промышленных объектов ППТ не требуется.',time:'4–6 мес.',who:'Местная администрация, проектная организация',law:'ГрК РФ ст. 42–46 [grk]',checks:['Определена необходимость разработки ППТ для данного объекта','При наличии ППТ — он утверждён местной администрацией','Границы земельного участка не требуют корректировки'],questions:['Требуется ли для данного проекта разработка ППТ?','Если ППТ утверждён — предоставьте реквизиты постановления.','Соответствует ли конфигурация участка целям проекта?'],warn:null}
    }
   ]

  {id:'s2',
   zh:{name:'设计阶段',short:'设计'},
   ru:{name:'Проектирование',short:'Проектирование'},
   steps:[
    {id:'2.1',
     zh:{name:'工程勘察',desc:'综合工作包括大地测量、工程地质、水文及生态勘察。勘察成果是编制设计文件的必要基础，由勘察类СРО成员企业承担。',time:'1–2个月',who:'勘察单位（СРО成员）',law:'城市规划法典第47条 [grk]',checks:['已下达各类勘察的技术委托书','勘察单位具有СРО成员资格','已取得大地测量勘察报告','已取得工程地质勘察报告','如需要——已完成生态勘察'],questions:['该地块是否已进行过工程勘察——何时进行，由哪家单位承担？','请提供勘察报告。数据时效性如何？','是否存在复杂地质条件（软弱地基、岩溶、洪涝风险）？','是否有辐射状况及土壤生态状况鉴定结论？'],warn:null},
     ru:{name:'Инженерные изыскания',desc:'Комплекс работ включает геодезические, геологические, гидрологические и экологические изыскания. Результаты изысканий — обязательная основа для разработки проектной документации. Выполняются членами СРО по изысканиям.',time:'1–2 мес.',who:'Организация-изыскатель (член СРО)',law:'ГрК РФ ст. 47 [grk]',checks:['Выданы технические задания на все виды изысканий','Изыскательская организация имеет членство в СРО','Получены отчёты по геодезическим изысканиям','Получены отчёты по инженерно-геологическим изысканиям','При необходимости — выполнены экологические изыскания'],questions:['Выполнялись ли инженерные изыскания на данном участке — когда и кем?','Предоставьте отчёты по изысканиям. Срок давности данных?','Выявлены ли сложные геологические условия?','Есть ли заключение о радиационной обстановке и экологическом состоянии грунтов?'],warn:null}
    },
    {id:'2.2',
     zh:{name:'市政管网接入技术条件（ТУ）',desc:'ТУ由资源供应企业根据业主申请出具，规定接入点位置、分配容量及技术要求，是设计文件工程管网章节（ИОС）的必备输入文件。',time:'1–2个月（各管网并行办理）',who:'资源供应企业：电力、水务、燃气、热力公司',law:'政府决议第861号（供电） [pp861]; 第808号（供热） [pp808]; 联邦法416（供排水） [fz416]',checks:['已取得供电技术条件','已取得供水技术条件','已取得排水（污水）技术条件','已取得燃气供应技术条件（如需）','已取得供热技术条件（如需）','ТУ有效期未过期（通常为2–5年）'],questions:['请提供全套技术条件文件。各ТУ的有效期至何时？','已分配的容量是否满足规划生产的需求？','是否需要自建管线至接入点？','是否已签署技术接入协议，还是仅有ТУ文件？'],warn:{zh:'大型工业项目（670千瓦以上）的供电ТУ审批可能长达6个月，并可能需要自建变电站，这对项目工期至关重要。',ru:'ТУ на электроснабжение для крупных промышленных объектов (от 670 кВт) могут выдаваться до 6 месяцев и требовать строительства собственной подстанции. Это критично для сроков проекта.'}},
     ru:{name:'Технические условия на подключение к сетям',desc:'ТУ выдаются ресурсоснабжающими организациями по заявлению заказчика. Фиксируют точку подключения, выделяемую мощность, технические требования. Обязательный входной документ для раздела ИОС проектной документации.',time:'1–2 мес. (параллельно по всем сетям)',who:'РСО: энергосбыт, водоканал, газовая служба, теплосеть',law:'ПП РФ №861 (электро) [pp861]; ПП РФ №808 (тепло) [pp808]; ФЗ-416 (вода) [fz416]',checks:['Получены ТУ на электроснабжение','Получены ТУ на водоснабжение','Получены ТУ на водоотведение (канализацию)','Получены ТУ на газоснабжение (при необходимости)','Получены ТУ на теплоснабжение (при необходимости)','Срок действия ТУ не истёк (обычно 2–5 лет)'],questions:['Предоставьте комплект ТУ по всем сетям. Каков срок их действия?','Достаточны ли выделенные мощности для планируемого производства?','Требуется ли строительство собственных сетей до точки подключения?','Заключены ли договоры о технологическом подключении или только ТУ?'],warn:{zh:'大型工业项目（670千瓦以上）的供电ТУ审批可能长达6个月，并可能需要自建变电站，这对项目工期至关重要。',ru:'ТУ на электроснабжение для крупных промышленных объектов (от 670 кВт) могут выдаваться до 6 месяцев и требовать строительства собственной подстанции. Это критично для сроков проекта.'}}
    },
    {id:'2.3',
     zh:{name:'编制设计文件（ПД阶段）',desc:'设计文件按照政府决议第87号规定的组成编制：从说明书到预算共13个部分。2022年起强制使用BIM技术。编制方须为设计类СРО成员单位。',time:'3–6个月',who:'设计院（设计类СРО成员）',law:'城市规划法典第48条 [grk]; 政府决议第87号 [pp87]; 联邦法384 [fz384]',checks:['已编制完整的ПД（按政府决议第87号第1–13部分）','设计院具有СРО成员资格','ПД中包含消防安全章节（第9部分）','已编制预算（第11/12部分）或有不编制的书面依据','ПД依据最新技术条件和勘察数据编制'],questions:['请提供ПД文件目录（第0卷）。各章节是否均已编制？','谁是总设计师？是否具有СРО资质？','设计采用何种软件完成？是否有BIM模型？','结合地质条件，基础工程采用了什么技术方案？'],warn:null},
     ru:{name:'Разработка проектной документации (стадия ПД)',desc:'Проектная документация разрабатывается в составе, установленном ПП РФ №87: 13 разделов от пояснительной записки до сметы. Обязательно применение BIM-технологий (с 2022). Разработчик — проектная организация с членством в СРО.',time:'3–6 мес.',who:'Проектная организация (член СРО проектировщиков)',law:'ГрК РФ ст. 48 [grk]; ПП РФ №87 [pp87]; ФЗ-384 [fz384]',checks:['Разработан полный комплект ПД (разделы 1–13 по ПП №87)','Проектная организация имеет членство в СРО','В составе ПД есть раздел по пожарной безопасности (раздел 9)','Разработана смета (раздел 11/12) или обоснование её отсутствия','ПД разработана на основании актуальных ТУ и данных изысканий'],questions:['Предоставьте состав ПД (том 0). Все ли разделы по ПП №87 разработаны?','Кто является главным проектировщиком? Есть ли СРО-допуск?','На каком ПО выполнено проектирование? Есть ли BIM-модель?','Какие технические решения приняты по фундаментам с учётом геологии?'],warn:null}
    },
    {id:'2.4',
     zh:{name:'设计文件及勘察成果国家鉴定',desc:'对于未纳入城市规划法典第49条第2款豁免范围的所有永久性建筑均为强制要求。审查期限为42个工作日（2025年起不再允许多次延期）。审查通过后出具鉴定正面结论（ЗОЭ）——没有该结论将无法获得施工许可证。',time:'42个工作日（法定）；实际约2–4个月',who:'国家鉴定机构（联邦主鉴定局或地方鉴定机构）',law:'城市规划法典第49条 [grk]; 政府决议第145号 [pp145]',checks:['已取得国家鉴定正面结论（ЗОЭ）','ЗОЭ由该项目类型的有权机构出具','鉴定结论有效——取得结论后设计文件未经修改','如有变更——已对变更部分完成补充鉴定'],questions:['是否已取得鉴定正面结论？请提供文号及日期。','负责鉴定的是哪个机构——联邦主鉴定局还是地方鉴定机构？','取得ЗОЭ后，设计文件是否进行过修改？','如尚未通过鉴定——目前处于审查哪个阶段，存在哪些意见？'],warn:{zh:'鉴定负面结论将直接阻断施工许可证的发放。整改意见并重新提交通常需要额外1–3个月。',ru:'Отрицательное заключение экспертизы блокирует выдачу разрешения на строительство. Устранение замечаний и повторная подача занимают 1–3 месяца дополнительно.'}},
     ru:{name:'Государственная экспертиза ПД и результатов изысканий',desc:'Обязательна для всех объектов капитального строительства, не включённых в перечень исключений ГрК ст. 49 ч. 2. Срок — 42 рабочих дня (с 2025 года без возможности неоднократного продления). По итогам выдаётся положительное заключение экспертизы (ЗОЭ).',time:'42 рабочих дня (закон); реально 2–4 мес.',who:'Государственная экспертиза (Главгосэкспертиза или региональная)',law:'ГрК РФ ст. 49 [grk]; ПП РФ №145 [pp145]',checks:['Получено положительное заключение государственной экспертизы (ЗОЭ)','ЗОЭ выдано органом, уполномоченным для данного объекта','Заключение действует — ПД не изменялась после его получения','В случае изменений — выполнена повторная экспертиза изменённых разделов'],questions:['Получено ли положительное заключение экспертизы? Предоставьте его реквизиты.','Какой орган проводил экспертизу — Главгосэкспертиза или региональная?','Вносились ли изменения в ПД после получения ЗОЭ?','Если экспертиза не пройдена — на каком этапе рассмотрение, какие замечания?'],warn:{zh:'鉴定负面结论将直接阻断施工许可证的发放。整改意见并重新提交通常需要额外1–3个月。',ru:'Отрицательное заключение экспертизы блокирует выдачу разрешения на строительство. Устранение замечаний и повторная подача занимают 1–3 месяца дополнительно.'}}
    }

  {id:'s2e',
   zh:{name:'生态鉴定',short:'生态鉴定'},
   ru:{name:'Экологическая экспертиза',short:'ГЭЭ'},
   steps:[
    {id:'E.1',
     zh:{name:'判断是否需要进行国家生态鉴定（ГЭЭ）',desc:'根据ФЗ-174第11–12条，并非所有建设项目均需进行国家生态鉴定。联邦级ГЭЭ主要适用于：属于I类影响类别的项目（如化工厂、金属冶炼、危险废物处置）；位于特别自然保护区（ООПТ）内或附近的项目；位于水源保护区、贝加尔湖保护区内的项目；以及北极地区项目。地方级ГЭЭ由各联邦主体生态监督机构负责（ФЗ-174第12条）。2024年9月1日起，ФЗ-673/2023对第11条进行了重大修订。',time:'2–4周（仅筛查）',who:'业主、生态咨询公司',law:'联邦法174第11–12条 [fz174]; 联邦法7第32条 [fz7]; 政府决议第694号（2024年） [pp694]',checks:['已明确项目的环境影响类别（I–IV类）','已确认项目是否需要进行联邦级ГЭЭ','已确认项目是否需要进行地方级ГЭЭ','如不需要ГЭЭ——已取得书面确认（备忘录）','如需要ГЭЭ——已明确负责机构（联邦自然资源监督局或地方机构）'],questions:['本项目的环境影响类别（НВОСа）是什么？','项目选址是否位于特别自然保护区、水源保护区或其他敏感地带？','是否已向联邦自然资源监督局（Росприроднадзор）核实ГЭЭ要求？','如不需要ГЭЭ——是否已取得相应确认文件？'],warn:null},
     ru:{name:'Определение необходимости ГЭЭ',desc:'Согласно ст. 11–12 ФЗ-174, ГЭЭ требуется не для всех строительных объектов. Федеральная ГЭЭ обязательна для: объектов I категории НВОС (химпром, металлургия, обращение с опасными отходами); объектов в границах ООПТ федерального значения; объектов в водоохранных зонах, зонах охраны Байкальской природной территории; объектов в Арктической зоне. Региональная ГЭЭ — объекты, отнесённые ст. 12 ФЗ-174 к уровню субъекта. С 01.09.2024 действует новая редакция ст. 11 (ФЗ-673 от 25.12.2023).',time:'2–4 нед. (только скрининг)',who:'Заказчик, экологический консультант',law:'ФЗ-174 ст. 11–12 [fz174]; ФЗ-7 ст. 32 [fz7]; ПП РФ №694 (2024) [pp694]',checks:['Определена категория объекта НВОС (I–IV)','Подтверждена необходимость федеральной ГЭЭ','Подтверждена необходимость региональной ГЭЭ','При отсутствии требования ГЭЭ — получено письменное подтверждение','При наличии требования — определён уполномоченный орган (Росприроднадзор или региональный)'],questions:['Какова категория объекта по НВОС?','Расположен ли объект в границах ООПТ, водоохранных зон или иных чувствительных территорий?','Согласована ли позиция по ГЭЭ с Росприроднадзором?','При отсутствии требования ГЭЭ — есть ли подтверждающее письмо?'],warn:null}
    },
    {id:'E.2',
     zh:{name:'编制环境影响评价（ОВОС）和提交申请',desc:'参加ГЭЭ的必要条件是提供ОВОС材料（环境影响评价），这是ФЗ-174第14条规定的强制性文件。ОВОС作为设计文件的一部分编制，并须经过公众讨论（ФЗ-7第32条）。提交给联邦自然资源监督局（Росприроднадзор）或地方主管机关的材料清单由2024年5月8日第283号部令规定。ГЭЭ审查期限——不超过6个月（有减期规定）。',time:'3–6个月',who:'设计院（ОВОС）、联邦自然资源监督局（Росприроднадзор）',law:'联邦法174第14条 [fz174]; 联邦法7第32条 [fz7]; 自然资源部令第283号（2024年5月） [fz174]',checks:['已编制ОВОС并经过公众讨论','已准备好ГЭЭ全套申请材料（依据2024年第283号部令）','已向有权机关提交材料','已缴纳ГЭЭ费用（依据ФЗ-174第28条）','已取得ГЭЭ正面结论','ГЭЭ结论有效——设计文件未在获得结论后进行修改'],questions:['是否已完成ОВОС及公众讨论？','是否已提交ГЭЭ申请？当前审查处于哪个阶段？','审查期限是否有被中止的风险（材料不完整）？','如已获得ГЭЭ结论——是否在取得结论后对设计文件进行过修改？'],warn:{zh:'缺少ГЭЭ正面结论，而法律有此要求时，属于行政违法（КоАП第8.4条），最高罚款可达100万卢布，且整个项目将被叫停。该结论在施工期间均须保持有效状态。',ru:'Отсутствие положительного заключения ГЭЭ при наличии такого требования — административное правонарушение по ст. 8.4 КоАП РФ, штраф до 1 млн руб., приостановление деятельности. Заключение должно оставаться действительным на весь период строительства.'}},
     ru:{name:'Подготовка ОВОС и прохождение ГЭЭ',desc:'Обязательное условие прохождения ГЭЭ — материалы ОВОС (оценки воздействия на окружающую среду), предусмотренные ст. 14 ФЗ-174. ОВОС разрабатывается в составе ПД и проходит общественное обсуждение (ст. 32 ФЗ-7). Состав материалов для подачи в Росприроднадзор или региональный орган определён Приказом Минприроды №283 от 08.05.2024. Срок ГЭЭ — не более 6 месяцев (с правом сокращения).',time:'3–6 мес.',who:'Проектная организация (ОВОС), Росприроднадзор или региональный орган',law:'ФЗ-174 ст. 14 [fz174]; ФЗ-7 ст. 32 [fz7]; ПП РФ №694 (2024) [pp694]',checks:['ОВОС разработан и прошёл общественное обсуждение','Подготовлен полный комплект документов для ГЭЭ (по Приказу №283/2024)','Материалы поданы в уполномоченный орган','Оплачен сбор за проведение ГЭЭ (ст. 28 ФЗ-174)','Получено положительное заключение ГЭЭ','Заключение ГЭЭ действует — ПД не изменялась после его получения'],questions:['Разработан ли ОВОС и проведено ли общественное обсуждение?','Подана ли заявка на ГЭЭ? На каком этапе рассмотрение?','Есть ли риск приостановления срока (неполнота материалов)?','Если заключение получено — вносились ли изменения в ПД после его получения?'],warn:{zh:'缺少ГЭЭ正面结论，而法律有此要求时，属于行政违法（КоАП第8.4条），最高罚款可达100万卢布，且整个项目将被叫停。该结论在施工期间均须保持有效状态。',ru:'Отсутствие положительного заключения ГЭЭ при наличии такого требования — административное правонарушение по ст. 8.4 КоАП РФ, штраф до 1 млн руб., приостановление деятельности. Заключение должно оставаться действительным на весь период строительства.'}}
    }
   ]
  },
  {id:'s3',
   zh:{name:'施工许可证',short:'施工许可'},
   ru:{name:'Разрешение на строительство',short:'РС'},
   steps:[
    {id:'3.1',
     zh:{name:'取得施工许可证（РС）',desc:'施工许可证是开始实体施工的法律依据，由地方自治机关颁发。有效期由施工组织设计（ПОС）确定。重要提示：自2026年3月1日起，城市规划法典第51条将有重大修订（联邦法304号，2025年7月31日）。',time:'5个工作日（法定）；实际1–2个月',who:'地方自治机关或有权机关',law:'城市规划法典第51条 [grk]',checks:['已取得施工许可证','施工许可证有效期足以完成建设','施工许可证由有权机关颁发','施工许可证中载明的项目参数正确无误'],questions:['是否已取得施工许可证？请提供副本。','施工许可证有效期至何时？是否与规划工期相符？','如尚未取得施工许可证——障碍在哪里？','施工许可证是否与当前版本的设计文件相对应？'],warn:{zh:'自2026年3月1日起，城市规划法典第51条按新版本执行（联邦法304号，2025年7月31日）。该日期前已颁发的施工许可证按原条件继续有效。',ru:'С 01.03.2026 ст. 51 ГрК РФ действует в новой редакции (ФЗ-304 от 31.07.2025). РС, выданные до этой даты, действуют на прежних условиях.'}},
     ru:{name:'Получение разрешения на строительство (РС)',desc:'Разрешение на строительство — финальный документ, открывающий право на физическое строительство. Выдаётся органом местного самоуправления. Срок действия определяется ПОС. С 01.03.2026 вступают в силу изменения ст. 51 ГрК РФ.',time:'5 раб. дней (закон); реально 1–2 мес.',who:'Орган местного самоуправления или уполномоченный орган',law:'ГрК РФ ст. 51 [grk]',checks:['Получено разрешение на строительство','Срок действия РС достаточен для завершения строительства','РС выдано надлежащим уполномоченным органом','В РС указаны корректные параметры объекта'],questions:['Получено ли разрешение на строительство? Предоставьте копию.','Каков срок действия РС? Соответствует ли он планируемым срокам строительства?','Если РС не получено — что является препятствием?','Соответствует ли РС текущей версии проектной документации?'],warn:{zh:'自2026年3月1日起，城市规划法典第51条按新版本执行（联邦法304号，2025年7月31日）。该日期前已颁发的施工许可证按原条件继续有效。',ru:'С 01.03.2026 ст. 51 ГрК РФ действует в новой редакции (ФЗ-304 от 31.07.2025). РС, выданные до этой даты, действуют на прежних условиях.'}}
    }
   ]
  },
  {id:'s4',
   zh:{name:'施工阶段',short:'施工'},
   ru:{name:'Строительство',short:'Строительство'},
   steps:[
    {id:'4.1',
     zh:{name:'开工通知及建设监理',desc:'施工开始前，业主须向国家建设监督局（Госстройнадзор）提交开工通知，并确保建设监理工作的开展。建设监理由业主和承包方按政府决议第468号要求共同执行。总承包商须为建筑类СРО成员。',time:'贯穿整个施工过程',who:'业主、总承包商（СРО成员）、国家建设监督局',law:'城市规划法典第52条 [grk]; 政府决议第468号 [pp468]; СП 48规范 [sp48]',checks:['已向国家建设监督局提交开工通知','已签署总承包合同','总承包商具有建筑类СРО成员资格','已指定建设监理负责人','已开立工程总日志（КС-6格式）','已取得土方作业许可（如需）'],questions:['是否已提交开工通知？提交时间？','谁是总承包商？请提供СРО资质信息。','是否在记录施工总日志？能否查阅最近的记录？','业主方是否在现场设有技术监督人员？','国家建设监督局是否已进行过检查？是否有整改通知？'],warn:null},
     ru:{name:'Извещение о начале работ и строительный контроль',desc:'До начала строительства заказчик обязан направить извещение в Госстройнадзор и обеспечить ведение строительного контроля в соответствии с ПП РФ №468. Генеральный подрядчик должен быть членом СРО строителей.',time:'Постоянно в ходе строительства',who:'Заказчик, генподрядчик (член СРО), Госстройнадзор',law:'ГрК РФ ст. 52 [grk]; ПП РФ №468 [pp468]; СП 48.13330.2019 [sp48]',checks:['Направлено извещение о начале строительства в Госстройнадзор','Заключён договор генерального подряда','Генподрядчик имеет членство в СРО строителей','Назначен ответственный за строительный контроль','Открыт общий журнал работ (форма КС-6)','На объект выдан ордер на земляные работы (при необходимости)'],questions:['Направлено ли извещение о начале работ? Когда?','Кто является генеральным подрядчиком? Предоставьте данные СРО-допуска.','Ведётся ли общий журнал работ?','Назначен ли технический надзор от заказчика?','Проводились ли проверки Госстройнадзора? Есть ли предписания?'],warn:null}
    },
    {id:'4.2',
     zh:{name:'设计监督与竣工技术档案',desc:'设计监督（авторский надзор）由设计方在施工过程中实施，对通过国家鉴定的项目为强制要求（城市规划法典第52条第2款）。竣工技术档案记录所有隐蔽工程的实际参数，是竣工验收的依据。',time:'贯穿整个施工过程',who:'设计院（设计监督）、总承包商（竣工档案）',law:'城市规划法典第52条第2款 [grk]; СП 48规范第5节 [sp48]',checks:['已与设计方签署设计监督合同','设计监督日志正在记录中','隐蔽工程验收记录正在办理','已完成已施工构件的竣工测量','竣工技术档案已妥善保存并系统整理'],questions:['是否已与设计方签署设计监督合同？','设计监督日志是否在记录？设计方现场巡查的频率如何？','竣工技术档案如何管理——是否有专职负责人？','所有隐蔽工程是否均已完成验收记录？'],warn:null},
     ru:{name:'Авторский надзор и исполнительная документация',desc:'Авторский надзор осуществляется проектировщиком в ходе строительства и является обязательным для объектов, проходящих госэкспертизу (ГрК ст. 52 ч. 2). Исполнительная документация фиксирует фактические параметры всех скрытых работ.',time:'В ходе всего строительства',who:'Проектная организация (авт. надзор), генподрядчик (исп. документация)',law:'ГрК РФ ст. 52 ч. 2 [grk]; СП 48.13330.2019 разд. 5 [sp48]',checks:['Заключён договор на авторский надзор с проектировщиком','Ведётся журнал авторского надзора','Оформляются акты освидетельствования скрытых работ','Ведётся исполнительная съёмка по выполненным конструкциям','Исполнительная документация хранится и систематизирована'],questions:['Заключён ли договор на авторский надзор с проектировщиком?','Ведётся ли журнал авторского надзора?','Как организовано ведение исполнительной документации?','Все ли скрытые работы освидетельствованы актами?'],warn:null}
    },
    {id:'4.3',
     zh:{name:'消防安全与危险生产设施（ОПО）',desc:'工业建筑必须按ФЗ-123（技术法规·消防安全要求）在设计阶段制定消防安全措施。若项目属于危险生产设施（根据ФЗ-116分类），须额外获得工业安全证明书并在Ростехнадзор（技术监督局）进行登记。主要检查内容包括消防系统合理性及建筑中的疏散方案。',time:'贯穿整个施工阶段',who:'设计院（消防安全章节）、业主（ОПО登记）',law:'联邦法123（消防安全） [fz123]; 联邦法116（工业安全） [fz116]; 城市规划法典第49条 [grk]',checks:['设计文件第9部分（消防安全）已通过国家鉴定','消防系统已按设计文件要求安装','如项目为ОПО——已在Ростехнадзор完成登记','如项目为ОПО——已取得工业安全证明书','消防水源已核实（消火栓、取水口）','疏散路线已按设计文件实施'],questions:['本项目是否被列为危险生产设施（ОПО）？','是否已在Ростехнадзор进行ОПО登记？','消防系统（自动喷淋、报警、排烟）是否已按设计安装？','是否已进行初步消防检查？'],warn:null},
     ru:{name:'Пожарная безопасность и ОПО',desc:'Промышленные объекты обязаны иметь раздел пожарной безопасности (раздел 9 ПД) в соответствии с ФЗ-123. Если объект относится к опасным производственным объектам (ОПО по ФЗ-116), дополнительно требуется декларация промышленной безопасности и регистрация в Ростехнадзоре. Проверяется соответствие систем фактически реализованным проектным решениям.',time:'В ходе строительства',who:'Проектная организация (разд. 9), заказчик (регистрация ОПО)',law:'ФЗ-123 (тех. регламент пожарной безопасности) [fz123]; ФЗ-116 (пром. безопасность) [fz116]; ГрК РФ ст. 49 [grk]',checks:['Раздел 9 ПД (пожарная безопасность) прошёл госэкспертизу','Системы пожаротушения смонтированы по ПД','При отнесении к ОПО — объект зарегистрирован в Ростехнадзоре','При отнесении к ОПО — разработана декларация промышленной безопасности','Обеспечено наружное противопожарное водоснабжение (гидранты, пирсы)','Пути эвакуации реализованы по ПД'],questions:['Относится ли объект к опасным производственным объектам (ОПО)?','Зарегистрирован ли объект в Ростехнадзоре как ОПО?','Смонтированы ли системы пожарной сигнализации, АУПТ, дымоудаления?','Проводились ли предварительные проверки пожарного надзора?'],warn:null}
    },

// ─── STATE ────────────────────────────────────────────────────────────────────
let lang='zh', activeStage=0, activeStep=0, checked={};
function getChecked(id){if(!checked[id])checked[id]=new Set();return checked[id];}

// ─── LANG ─────────────────────────────────────────────────────────────────────
function setLang(l){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',
    (l==='ru'&&b.textContent==='Русский')||(l==='zh'&&b.textContent==='中文')));
  document.documentElement.lang=l==='zh'?'zh-CN':'ru';
  const u=UI[l];
  document.getElementById('logo-title').textContent=u.logoTitle;
  document.getElementById('logo-sub').textContent=u.logoSub;
  document.getElementById('sidebar-title').textContent=u.sidebarTitle;
  document.getElementById('btn-prev').textContent=u.btnPrev;
  document.getElementById('btn-next').textContent=u.btnNext;
  document.getElementById('export-label').textContent=u.exportLabel;
  document.getElementById('footer-text').textContent=u.footer;
  render();
}

// ─── LAW BADGES ───────────────────────────────────────────────────────────────
function renderLawBadges(lawStr){
  return parseLaw(lawStr).map(item=>{
    const law=item.key?LAWS[item.key]:null;
    if(law) return `<a class="badge badge-law" href="${law.url}" target="_blank" rel="noopener" title="${law.label} — consultant.ru">📋 ${item.text}</a>`;
    return `<span class="badge badge-law">📋 ${item.text}</span>`;
  }).join('');
}

// ─── EXCEL EXPORT ─────────────────────────────────────────────────────────────
function exportExcel(){
  const u=UI[lang];
  const rows=[[u.excelTitle,'','','','','','']];
  rows.push(['']);
  rows.push([u.colStage,u.colStep,u.colName,u.colTime,u.colStatus,u.colDone,u.colTotal]);

  DATA.stages.forEach(stage=>{
    stage.steps.forEach(step=>{
      const d=step[lang];
      const c=getChecked(step.id);
      const total=d.checks.length, done=c.size;
      let status=u.statusPending;
      if(done===total&&total>0) status=u.statusDone;
      else if(done>0) status=u.statusPartial;
      rows.push([stage[lang].name, step.id, d.name, d.time, status, done, total]);

      // Детальные строки чеклиста
      d.checks.forEach((chk,i)=>{
        rows.push(['','','  '+(c.has(i)?'☑':'☐')+' '+chk,'','','','']);
      });
      rows.push(['','','','','','','']);
    });
  });

  const ws=XLSX.utils.aoa_to_sheet(rows);

  // Ширина колонок
  ws['!cols']=[{wch:22},{wch:8},{wch:52},{wch:20},{wch:14},{wch:10},{wch:10}];

  // Мёрж заголовка
  ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:6}}];

  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,lang==='zh'?'项目状态':'Статус проекта');

  const date=new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb,`construction-navigator-${date}.xlsx`);
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(){renderPipeline();renderMobileStageNav();renderStepList();renderDetail();updateNavButtons();}

function renderPipeline(){
  document.getElementById('pipeline').innerHTML=DATA.stages.map((s,i)=>{
    const dots=s.steps.map(step=>{
      const c=getChecked(step.id);
      const total=step[lang].checks.length;
      const done=c.size;
      let cls='';
      if(total>0&&done===total) cls='done';
      else if(done>0) cls='partial';
      return `<span class="${cls}"></span>`;
    }).join('');
    return `<div class="pipe-stage ${i===activeStage?'active':''}" onclick="selectStage(${i})"><div class="pipe-stage-inner"><div class="pipe-num">0${i+1}</div><div class="pipe-label">${s[lang].short}</div><div class="pipe-dot">${dots}</div></div></div>`;
  }).join('');
}

function renderMobileStageNav(){
  document.getElementById('mobileStageNav').innerHTML=DATA.stages.map((s,i)=>
    `<button class="mobile-stage-btn ${i===activeStage?'active':''}" onclick="selectStage(${i})">${i+1}. ${s[lang].short}</button>`
  ).join('');
}

function renderStepList(){
  const stage=DATA.stages[activeStage];
  document.getElementById('stepList').innerHTML=stage.steps.map((step,i)=>{
    const c=getChecked(step.id),total=step[lang].checks.length,done=c.size;
    let sc='pending',si='';
    if(done===total&&total>0){sc='done';si='✓';}else if(done>0){sc='warn';si=done;}
    return `<div class="step-item ${i===activeStep?'active':''}" onclick="selectStep(${i})"><div class="step-status ${sc}">${si}</div><div class="step-info"><div class="step-code">${step.id}</div><div class="step-name">${step[lang].name}</div><div class="step-time">${step[lang].time}</div></div></div>`;
  }).join('');
}

function renderDetail(){
  const stage=DATA.stages[activeStage],step=stage.steps[activeStep],d=step[lang],c=getChecked(step.id),u=UI[lang];
  const total=d.checks.length,done=c.size,pct=total>0?Math.round(done/total*100):0;
  const checks=d.checks.map((txt,i)=>`<div class="check-item ${c.has(i)?'checked':''}" onclick="toggleCheck('${step.id}',${i})"><div class="check-box">${c.has(i)?'✓':''}</div><div class="check-text">${txt}</div></div>`).join('');
  const questions=d.questions.map(q=>`<div class="q-item">${q}</div>`).join('');
  const warn=d.warn?`<div class="warn-block"><strong>${u.warnLabel}</strong>${d.warn[lang]}</div>`:'';
  document.getElementById('detailPanel').innerHTML=`<div class="detail"><div class="detail-header"><div class="detail-stage-tag">${u.stageLabel} ${activeStage+1} · ${stage[lang].name}</div><div class="detail-title">${step.id}. ${d.name}</div><div class="detail-meta"><span class="badge badge-time">⏱ ${d.time}</span><span class="badge badge-who">👤 ${d.who}</span>${renderLawBadges(d.law)}</div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div></div><div class="detail-body"><div class="section-label">${u.sectionDesc}</div><div class="desc-text">${d.desc}</div>${warn}<div class="section-label">${u.sectionChecks} · ${done}/${total}</div><div class="checklist">${checks}</div><div class="section-label">${u.sectionQuestions}</div><div class="questions">${questions}</div></div></div>`;
}

function selectStage(i){activeStage=i;activeStep=0;render();}
function selectStep(i){activeStep=i;renderStepList();renderDetail();updateNavButtons();if(window.innerWidth<=768)document.getElementById('detailPanel').scrollIntoView({behavior:'smooth',block:'start'});}
function toggleCheck(id,idx){const c=getChecked(id);c.has(idx)?c.delete(idx):c.add(idx);renderPipeline();renderStepList();renderDetail();}
function navigate(dir){const stage=DATA.stages[activeStage],ns=activeStep+dir;if(ns>=0&&ns<stage.steps.length){selectStep(ns);}else if(dir>0&&activeStage<DATA.stages.length-1){selectStage(activeStage+1);}else if(dir<0&&activeStage>0){activeStage--;activeStep=DATA.stages[activeStage].steps.length-1;render();}}
function updateNavButtons(){
  const isFirst=(activeStage===0&&activeStep===0);
  const isLast=(activeStage===DATA.stages.length-1&&activeStep===DATA.stages[activeStage].steps.length-1);
  const btnPrev=document.getElementById('btn-prev');
  const btnNext=document.getElementById('btn-next');
  if(btnPrev) btnPrev.disabled=isFirst;
  if(btnNext) btnNext.disabled=isLast;
  if(btnNext) btnNext.classList.toggle('primary',!isLast);
}

render();
</script>
</body>
</html>
