<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>建设项目导航 / Навигатор строительного проекта</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Geologica:wght@300;400;500;600&display=swap');
  :root{--bg:#0d0f14;--surface:#151820;--surface2:#1c2030;--border:#2a3048;--accent:#e8c547;--accent2:#4f8ef7;--text:#e8ecf4;--text-muted:#7a85a3;--text-dim:#3d4562;--green:#4caf82;--orange:#f08840;--radius:12px;--radius-sm:8px;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Geologica',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;}
  header{position:sticky;top:0;z-index:100;background:rgba(13,15,20,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:64px;}
  .logo{font-family:'Unbounded',sans-serif;font-weight:900;font-size:13px;letter-spacing:.05em;color:var(--accent);text-transform:uppercase;line-height:1.2;}
  .logo span{color:var(--text-muted);font-weight:400;}
  .lang-switch{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:50px;padding:3px;gap:2px;}
  .lang-btn{padding:6px 16px;border-radius:50px;border:none;cursor:pointer;font-family:'Geologica',sans-serif;font-size:13px;font-weight:500;transition:all .2s;background:transparent;color:var(--text-muted);}
  .lang-btn.active{background:var(--accent);color:#000;}
  .hero{padding:48px 24px 32px;max-width:1100px;margin:0 auto;}
  .hero-tag{display:inline-flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:50px;padding:6px 14px;font-size:12px;color:var(--text-muted);margin-bottom:20px;letter-spacing:.08em;text-transform:uppercase;}
  .hero-tag::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent);}
  h1{font-family:'Unbounded',sans-serif;font-size:clamp(22px,4vw,42px);font-weight:900;line-height:1.15;margin-bottom:16px;letter-spacing:-.02em;}
  h1 em{font-style:normal;color:var(--accent);}
  .hero-sub{color:var(--text-muted);font-size:15px;line-height:1.7;max-width:640px;}
  .pipeline{display:flex;max-width:1100px;margin:0 auto 40px;padding:0 24px;overflow-x:auto;scrollbar-width:none;}
  .pipeline::-webkit-scrollbar{display:none;}
  .pipe-stage{flex:1;min-width:120px;cursor:pointer;}
  .pipe-stage-inner{background:var(--surface);border:1px solid var(--border);border-right:none;padding:14px 16px 12px;transition:all .2s;}
  .pipe-stage:last-child .pipe-stage-inner{border-right:1px solid var(--border);border-radius:0 var(--radius-sm) var(--radius-sm) 0;}
  .pipe-stage:first-child .pipe-stage-inner{border-radius:var(--radius-sm) 0 0 var(--radius-sm);}
  .pipe-stage.active .pipe-stage-inner{background:var(--accent);border-color:var(--accent);}
  .pipe-stage:hover:not(.active) .pipe-stage-inner{background:var(--surface2);}
  .pipe-num{font-family:'Unbounded',sans-serif;font-size:10px;font-weight:700;color:var(--text-dim);margin-bottom:4px;}
  .pipe-stage.active .pipe-num{color:rgba(0,0,0,.4);}
  .pipe-label{font-size:11px;font-weight:500;color:var(--text-muted);line-height:1.3;}
  .pipe-stage.active .pipe-label{color:#000;font-weight:700;}
  .pipe-dot{display:flex;gap:3px;margin-top:8px;}
  .pipe-dot span{width:5px;height:5px;border-radius:50%;background:var(--text-dim);}
  .pipe-stage.active .pipe-dot span{background:rgba(0,0,0,.3);}
  .pipe-dot span.done{background:var(--green);}
  .main{max-width:1100px;margin:0 auto;padding:0 24px 80px;display:grid;grid-template-columns:300px 1fr;gap:24px;align-items:start;}
  .sidebar{position:sticky;top:80px;}
  .sidebar-title{font-family:'Unbounded',sans-serif;font-size:10px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.12em;margin-bottom:12px;padding:0 4px;}
  .step-list{display:flex;flex-direction:column;gap:4px;}
  .step-item{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-radius:var(--radius-sm);cursor:pointer;border:1px solid transparent;transition:all .18s;}
  .step-item:hover{background:var(--surface);border-color:var(--border);}
  .step-item.active{background:var(--surface2);border-color:var(--accent2);}
  .step-status{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;margin-top:1px;transition:all .2s;}
  .step-status.done{background:var(--green);border-color:var(--green);color:#fff;}
  .step-status.warn{background:var(--orange);border-color:var(--orange);color:#fff;}
  .step-status.pending{border-color:var(--text-dim);}
  .step-item.active .step-status.pending{border-color:var(--accent2);}
  .step-info{flex:1;min-width:0;}
  .step-code{font-size:10px;color:var(--text-dim);font-family:'Unbounded',sans-serif;margin-bottom:2px;}
  .step-name{font-size:13px;color:var(--text);line-height:1.35;}
  .step-item:not(.active) .step-name{color:var(--text-muted);}
  .step-time{font-size:11px;color:var(--text-dim);margin-top:2px;}
  .detail{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;animation:fadeIn .25s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .detail-header{padding:24px 28px 20px;border-bottom:1px solid var(--border);background:var(--surface2);}
  .detail-stage-tag{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;font-family:'Unbounded',sans-serif;font-weight:700;}
  .detail-title{font-family:'Unbounded',sans-serif;font-size:clamp(14px,2vw,18px);font-weight:700;line-height:1.3;margin-bottom:8px;}
  .detail-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;}
  .badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:50px;font-size:11px;font-weight:500;border:1px solid;text-decoration:none;transition:opacity .15s;}
  .badge:hover{opacity:.75;}
  .badge-time{color:var(--accent);border-color:rgba(232,197,71,.3);background:rgba(232,197,71,.08);}
  .badge-law{color:var(--accent2);border-color:rgba(79,142,247,.3);background:rgba(79,142,247,.08);cursor:pointer;}
  .badge-who{color:var(--text-muted);border-color:var(--border);background:var(--surface);}
  .progress-bar{height:3px;background:var(--surface2);border-radius:2px;margin-top:16px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .4s ease;}
  .detail-body{padding:24px 28px;}
  .section-label{font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--text-dim);font-family:'Unbounded',sans-serif;font-weight:700;margin-bottom:12px;margin-top:24px;}
  .section-label:first-child{margin-top:0;}
  .desc-text{font-size:14px;line-height:1.75;color:var(--text-muted);}
  .checklist{display:flex;flex-direction:column;gap:6px;}
  .check-item{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;}
  .check-item:hover{border-color:var(--text-dim);}
  .check-item.checked{border-color:rgba(76,175,130,.4);background:rgba(76,175,130,.05);}
  .check-box{width:18px;height:18px;border-radius:4px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .15s;font-size:11px;}
  .check-item.checked .check-box{background:var(--green);border-color:var(--green);color:#fff;}
  .check-text{font-size:13px;color:var(--text-muted);line-height:1.45;}
  .check-item.checked .check-text{color:var(--text-dim);text-decoration:line-through;}
  .questions{display:flex;flex-direction:column;gap:8px;}
  .q-item{padding:12px 16px 12px 36px;background:rgba(79,142,247,.06);border:1px solid rgba(79,142,247,.2);border-radius:var(--radius-sm);font-size:13px;line-height:1.55;color:var(--text);position:relative;}
  .q-item::before{content:'Q';position:absolute;left:12px;top:12px;font-family:'Unbounded',sans-serif;font-size:9px;font-weight:700;color:var(--accent2);}
  .warn-block{padding:14px 16px;background:rgba(240,136,64,.08);border:1px solid rgba(240,136,64,.25);border-radius:var(--radius-sm);font-size:13px;line-height:1.6;color:var(--orange);margin-top:8px;}
  .warn-block strong{display:block;margin-bottom:4px;font-size:11px;text-transform:uppercase;letter-spacing:.08em;}
  .mobile-stage-nav{display:none;padding:16px 24px;gap:8px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);}
  .mobile-stage-btn{flex-shrink:0;padding:8px 14px;border-radius:50px;border:1px solid var(--border);background:var(--surface);color:var(--text-muted);font-size:12px;cursor:pointer;font-family:'Geologica',sans-serif;transition:all .15s;}
  .mobile-stage-btn.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600;}
  .step-nav-mobile{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:12px 16px;gap:12px;z-index:50;}
  .step-nav-btn{flex:1;padding:12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);font-size:13px;cursor:pointer;font-family:'Geologica',sans-serif;}
  .step-nav-btn.primary{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600;}
  footer{border-top:1px solid var(--border);padding:20px 24px;text-align:center;font-size:11px;color:var(--text-dim);}
  @media(max-width:768px){
    .mobile-stage-nav{display:flex;}.step-nav-mobile{display:flex;}
    header{padding:0 16px;}.hero{padding:32px 16px 24px;}.pipeline{display:none;}
    .main{grid-template-columns:1fr;padding:0 16px 60px;}.sidebar{display:none;}
    .detail-header,.detail-body{padding:18px 20px;}
  }
</style>
</head>
<body>
<header>
  <div class="logo">
    <div id="logo-title">建设导航</div>
    <div><span id="logo-sub">工业建设 · 俄罗斯联邦</span></div>
  </div>
  <div class="lang-switch">
    <button class="lang-btn" onclick="setLang('ru')">Русский</button>
    <button class="lang-btn active" onclick="setLang('zh')">中文</button>
  </div>
</header>
<div class="mobile-stage-nav" id="mobileStageNav"></div>
<div class="hero">
  <div class="hero-tag" id="hero-tag">工业厂房 · 陆上建设</div>
  <h1 id="hero-title">从立项到<em>产权登记</em></h1>
  <p class="hero-sub" id="hero-sub">俄罗斯建设项目全流程导航工具。快速定位项目当前所处阶段，核实完成情况，在谈判中提出关键问题。</p>
</div>
<div class="pipeline" id="pipeline"></div>
<div class="main">
  <div class="sidebar">
    <div class="sidebar-title" id="sidebar-title">阶段步骤</div>
    <div class="step-list" id="stepList"></div>
  </div>
  <div id="detailPanel"></div>
</div>
<div class="step-nav-mobile">
  <button class="step-nav-btn" onclick="navigate(-1)" id="btn-prev">← 上一步</button>
  <button class="step-nav-btn primary" onclick="navigate(1)" id="btn-next">下一步 →</button>
</div>
<footer><span id="footer-text">规范依据：城市规划法典 · 土地法典 · 民法典 · 联邦法218 · 联邦法221 · 联邦法174 · 政府决议87 · 145 · 468 · СП 48规范 · 来源：consultant.ru / pravo.gov.ru</span></footer>

<script>

  'sp48':  { url:'https://docs.cntd.ru/document/554403782',                label:'СП 48.13330.2019' },

// Парсим строку вида "ГрК РФ ст.51 [grk]; ЗК РФ гл.V.1 [zk]"
// в массив {text, key}
function parseLaw(str) {
  return str.split(';').map(s => {
    const m = s.match(/\[(\w+)\]/);
    return { text: s.replace(/\[\w+\]/, '').trim(), key: m ? m[1] : null };
  });
}

// ─── DATA ─────────────────────────────────────────────────────────────────────
// law: строка формата "текст [ключ]; текст [ключ]"
// ключ ссылается на объект LAWS выше

      { id:'1.2',

// ─── STATE & LANG ─────────────────────────────────────────────────────────────
let lang='zh', activeStage=0, activeStep=0, checked={};
function getChecked(id){if(!checked[id])checked[id]=new Set();return checked[id];}

function setLang(l){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',
    (l==='ru'&&b.textContent==='Русский')||(l==='zh'&&b.textContent==='中文')));
  document.documentElement.lang=l==='zh'?'zh-CN':'ru';
  const u=UI[l];
  document.getElementById('logo-title').textContent=u.logoTitle;
  document.getElementById('logo-sub').textContent=u.logoSub;
  document.getElementById('hero-tag').textContent=u.heroTag;
  document.getElementById('hero-title').innerHTML=u.heroTitle;
  document.getElementById('hero-sub').textContent=u.heroSub;
  document.getElementById('sidebar-title').textContent=u.sidebarTitle;
  document.getElementById('btn-prev').textContent=u.btnPrev;
  document.getElementById('btn-next').textContent=u.btnNext;
  document.getElementById('footer-text').textContent=u.footer;
  render();
}

// Рендерим бейджи с законами — кликабельные ссылки
function renderLawBadges(lawStr) {
  return parseLaw(lawStr).map(item => {
    const law = item.key ? LAWS[item.key] : null;
    if (law) {
      return `<a class="badge badge-law" href="${law.url}" target="_blank" rel="noopener" title="${law.label}">📋 ${item.text}</a>`;
    }
    return `<span class="badge badge-law">📋 ${item.text}</span>`;
  }).join('');
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(){renderPipeline();renderMobileStageNav();renderStepList();renderDetail();}

function renderPipeline(){
  document.getElementById('pipeline').innerHTML=DATA.stages.map((s,i)=>{
    const dots=s.steps.map(()=>`<span class="${i<activeStage?'done':''}"></span>`).join('');
    return `<div class="pipe-stage ${i===activeStage?'active':''}" onclick="selectStage(${i})"><div class="pipe-stage-inner"><div class="pipe-num">0${i+1}</div><div class="pipe-label">${s[lang].short}</div><div class="pipe-dot">${dots}</div></div></div>`;
  }).join('');
}

function renderMobileStageNav(){
  document.getElementById('mobileStageNav').innerHTML=DATA.stages.map((s,i)=>
    `<button class="mobile-stage-btn ${i===activeStage?'active':''}" onclick="selectStage(${i})">${i+1}. ${s[lang].short}</button>`
  ).join('');
}

function renderStepList(){
  const stage=DATA.stages[activeStage];
  document.getElementById('stepList').innerHTML=stage.steps.map((step,i)=>{
    const c=getChecked(step.id),total=step[lang].checks.length,done=c.size;
    let sc='pending',si='';
    if(done===total&&total>0){sc='done';si='✓';}else if(done>0){sc='warn';si=done;}
    return `<div class="step-item ${i===activeStep?'active':''}" onclick="selectStep(${i})"><div class="step-status ${sc}">${si}</div><div class="step-info"><div class="step-code">${step.id}</div><div class="step-name">${step[lang].name}</div><div class="step-time">${step[lang].time}</div></div></div>`;
  }).join('');
}

function renderDetail(){
  const stage=DATA.stages[activeStage],step=stage.steps[activeStep],d=step[lang],c=getChecked(step.id),u=UI[lang];
  const total=d.checks.length,done=c.size,pct=total>0?Math.round(done/total*100):0;
  const checks=d.checks.map((txt,i)=>`<div class="check-item ${c.has(i)?'checked':''}" onclick="toggleCheck('${step.id}',${i})"><div class="check-box">${c.has(i)?'✓':''}</div><div class="check-text">${txt}</div></div>`).join('');
  const questions=d.questions.map(q=>`<div class="q-item">${q}</div>`).join('');
  const warn=d.warn?`<div class="warn-block"><strong>${u.warnLabel}</strong>${d.warn[lang]}</div>`:'';
  const lawBadges=renderLawBadges(d.law);
  document.getElementById('detailPanel').innerHTML=`<div class="detail"><div class="detail-header"><div class="detail-stage-tag">${u.stageLabel} ${activeStage+1} · ${stage[lang].name}</div><div class="detail-title">${step.id}. ${d.name}</div><div class="detail-meta"><span class="badge badge-time">⏱ ${d.time}</span><span class="badge badge-who">👤 ${d.who}</span>${lawBadges}</div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div></div><div class="detail-body"><div class="section-label">${u.sectionDesc}</div><div class="desc-text">${d.desc}</div>${warn}<div class="section-label">${u.sectionChecks} · ${done}/${total}</div><div class="checklist">${checks}</div><div class="section-label">${u.sectionQuestions}</div><div class="questions">${questions}</div></div></div>`;
}

function selectStage(i){activeStage=i;activeStep=0;render();}
function selectStep(i){activeStep=i;renderStepList();renderDetail();if(window.innerWidth<=768)document.getElementById('detailPanel').scrollIntoView({behavior:'smooth',block:'start'});}
function toggleCheck(id,idx){const c=getChecked(id);c.has(idx)?c.delete(idx):c.add(idx);renderStepList();renderDetail();}
function navigate(dir){const stage=DATA.stages[activeStage],newStep=activeStep+dir;if(newStep>=0&&newStep<stage.steps.length){selectStep(newStep);}else if(dir>0&&activeStage<DATA.stages.length-1){selectStage(activeStage+1);}else if(dir<0&&activeStage>0){activeStage--;activeStep=DATA.stages[activeStage].steps.length-1;render();}}

render();
</script>
